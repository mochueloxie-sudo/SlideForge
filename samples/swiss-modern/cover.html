<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: #ffffff;
    font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', sans-serif;
    color: #1a1a1a;
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }
  .top-bar {
    width: 100%; height: 8px; background: #ff3b30; flex-shrink: 0;
  }
  .left-bar {
    position: absolute; left: 80px; top: 8px; bottom: 0;
    width: 5px; background: #ff3b30;
  }
  .main {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center;
    padding: 80px 160px 80px 120px;
  }
  .eyebrow {
    font-size: 13px; font-weight: 500; letter-spacing: 0.22em;
    color: #ff3b30; text-transform: uppercase;
    margin-bottom: 20px;
  }
  .grid-line {
    width: 100%; height: 1px; background: #e5e5e5;
    margin-bottom: 48px;
  }
  .title {
    font-size: 108px; font-weight: 900; line-height: 0.95;
    letter-spacing: -0.04em; color: #1a1a1a;
    max-width: 1100px; margin-bottom: 56px;
  }
  .subtitle {
    font-size: 22px; font-weight: 400; line-height: 1.55;
    color: #666; max-width: 680px;
  }
  .bottom-bar {
    width: 100%; height: 3px;
    background: linear-gradient(90deg, #ff3b30 0%, #007aff 100%);
    flex-shrink: 0;
  }
  .page-num {
    position: absolute; bottom: 20px; right: 80px;
    font-size: 12px; color: #aaa; letter-spacing: 0.1em;
  }
  .col-num {
    position: absolute; top: 80px; right: 80px;
    font-size: 120px; font-weight: 900; color: #f0f0f0;
    letter-spacing: -0.05em; line-height: 1;
    user-select: none;
  }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="left-bar"></div>
<div class="col-num">01</div>
<div class="main">
  <div class="eyebrow">{{EYEBROW}}</div>
  <div class="grid-line"></div>
  <h1 class="title">{{TITLE}}</h1>
  <p class="subtitle">{{SUBTITLE}}</p>
</div>
<div class="bottom-bar"></div>
<span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
