<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; background: #ffffff; font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', sans-serif; color: #1a1a1a; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .top-bar { width: 100%; height: 6px; background: #ff3b30; flex-shrink: 0; }
  .left-bar { position: absolute; left: 80px; top: 6px; bottom: 0; width: 4px; background: #ff3b30; }
  .main { flex: 1; padding: 48px 100px 60px 120px; display: flex; flex-direction: column; }
  .eyebrow { font-size: 12px; font-weight: 500; letter-spacing: 0.22em; color: #ff3b30; text-transform: uppercase; margin-bottom: 10px; flex-shrink: 0; }
  .title { font-size: 52px; font-weight: 900; line-height: 1.0; letter-spacing: -0.04em; color: #1a1a1a; margin-bottom: 24px; flex-shrink: 0; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; flex: 1; }
  .card { border: 1px solid #e5e5e5; border-top: 3px solid #ff3b30; padding: 28px 26px; display: flex; flex-direction: column; background: #ffffff; }
  .card:nth-child(2n) { border-top-color: #007aff; }
  .card-icon { font-size: 24px; margin-bottom: 12px; }
  .card-title { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 10px; line-height: 1.3; letter-spacing: -0.02em; }
  .card-body { font-size: 15px; color: #666; line-height: 1.6; flex: 1; }
  .card-tag { display: inline-block; margin-top: 14px; font-size: 11px; letter-spacing: 0.12em; color: #ff3b30; border: 1px solid #e5e5e5; padding: 2px 8px; text-transform: uppercase; }
  .bottom-bar { width: 100%; height: 3px; background: linear-gradient(90deg, #ff3b30, #007aff); flex-shrink: 0; }
  .page-num { position: absolute; bottom: 20px; right: 80px; font-size: 12px; color: #aaa; }

  /* card-label: small category text above card title */
  .card-label {
    font-size: 12px; font-weight: 600; letter-spacing: 0.16em;
    text-transform: uppercase; opacity: 0.55; margin-bottom: 10px;
  }
  /* layout-2x2: 2-column card grid */
  body.layout-2x2 .grid {
    grid-template-columns: 1fr 1fr !important;
    max-width: 1520px !important;
    gap: 28px !important;
  }
  body.layout-2x2 .card  { padding: 44px 40px !important; }
  body.layout-2x2 .card-icon  { font-size: 44px !important; }
  body.layout-2x2 .card-title { font-size: 28px !important; }
  body.layout-2x2 .card-body  { font-size: 19px !important; }
  body.layout-2x2 .card-label { font-size: 13px !important; }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="left-bar"></div>
<div class="main">
  <div class="eyebrow">{{EYEBROW}}</div>
  <h1 class="title">{{TITLE}}</h1>
  <div class="grid">{{CARDS_HTML}}</div>
</div>
<div class="bottom-bar"></div>
<span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
