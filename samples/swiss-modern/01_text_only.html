<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: #ffffff;
    font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', sans-serif;
    color: #1a1a1a;
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }
  .top-bar { width: 100%; height: 6px; background: #ff3b30; flex-shrink: 0; }
  .left-bar {
    position: absolute; left: 80px; top: 6px; bottom: 0;
    width: 4px; background: #ff3b30;
  }
  .main {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center;
    padding: 60px 160px 60px 120px;
  }
  .eyebrow {
    font-size: 12px; font-weight: 500; letter-spacing: 0.22em;
    color: #ff3b30; text-transform: uppercase; margin-bottom: 12px;
  }
  .grid-rule { height: 1px; background: #e5e5e5; margin-bottom: 40px; max-width: 1100px; }
  .title {
    font-size: 72px; font-weight: 900; line-height: 1.0;
    letter-spacing: -0.04em; color: #1a1a1a;
    margin-bottom: 48px; max-width: 1100px;
  }
  .body-text {
    font-size: 22px; font-weight: 400; line-height: 1.65;
    color: #333; max-width: 900px; margin-bottom: 20px;
  }
  .secondary {
    font-size: 20px; font-weight: 300; line-height: 1.65;
    color: #888; max-width: 800px;
  }
  .bottom-rule { height: 1px; background: #e5e5e5; position: absolute; bottom: 60px; left: 120px; right: 80px; }
  .page-num { position: absolute; bottom: 36px; right: 80px; font-size: 12px; color: #aaa; letter-spacing: 0.1em; }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="left-bar"></div>
<div class="main">
  <div class="eyebrow">{{EYEBROW}}</div>
  <div class="grid-rule"></div>
  <h1 class="title">{{TITLE}}</h1>
  <p class="body-text">{{BODY}}</p>
  <p class="secondary">{{SECONDARY}}</p>
</div>
<div class="bottom-rule"></div>
<span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
