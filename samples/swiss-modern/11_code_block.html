<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; background: #ffffff; font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', sans-serif; color: #1a1a1a; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .top-bar { width: 100%; height: 6px; background: #ff3b30; flex-shrink: 0; }
  .left-bar { position: absolute; left: 80px; top: 6px; bottom: 0; width: 4px; background: #ff3b30; }
  .main { flex: 1; padding: 48px 100px 48px 120px; display: flex; flex-direction: column; }
  .eyebrow { font-size: 12px; font-weight: 500; letter-spacing: 0.22em; color: #ff3b30; text-transform: uppercase; margin-bottom: 10px; flex-shrink: 0; }
  .title { font-size: 56px; font-weight: 900; line-height: 1.0; letter-spacing: -0.04em; color: #1a1a1a; margin-bottom: 20px; flex-shrink: 0; }
  .code-wrap { flex: 1; min-height: 0; border: 1px solid #e5e5e5; overflow: hidden; display: flex; flex-direction: column; }
  .code-header { display: flex; align-items: center; gap: 8px; padding: 12px 18px; border-bottom: 1px solid #e5e5e5; background: #f5f5f5; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot-r { background: #ff5f57; } .dot-y { background: #febc2e; } .dot-g { background: #28c840; }
  .code-lang { margin-left: auto; font-size: 11px; color: #ff3b30; font-family: 'Courier New', monospace; letter-spacing: 0.10em; font-weight: 500; }
  .code-body { flex: 1; padding: 24px 36px; overflow: hidden; font-family: 'Courier New', monospace; font-size: 18px; line-height: 1.75; color: #1a1a1a; white-space: pre; background: #ffffff; border-left: 4px solid #ff3b30; }
  .bottom-bar { width: 100%; height: 3px; background: linear-gradient(90deg, #ff3b30, #007aff); flex-shrink: 0; }
  .page-num { position: absolute; bottom: 20px; right: 80px; font-size: 12px; color: #aaa; }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="left-bar"></div>
<div class="main">
  <div class="eyebrow">{{EYEBROW}}</div>
  <div class="title">{{TITLE}}</div>
  <div class="code-wrap">
    <div class="code-header">
      <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
      <span class="code-lang">{{CODE_LABEL}}</span>
    </div>
    <div class="code-body">{{CODE_SNIPPET}}</div>
  </div>
</div>
<div class="bottom-bar"></div>
<span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
