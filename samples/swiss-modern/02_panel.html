<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: #ffffff;
    font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', sans-serif;
    color: #1a1a1a;
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }
  .top-bar { width: 100%; height: 6px; background: #ff3b30; flex-shrink: 0; }
  .left-bar { position: absolute; left: 80px; top: 6px; bottom: 0; width: 4px; background: #ff3b30; }
  .main {
    flex: 1; padding: 56px 100px 56px 120px;
    display: flex; flex-direction: column;
  }
  .eyebrow {
    font-size: 12px; font-weight: 500; letter-spacing: 0.22em;
    color: #ff3b30; text-transform: uppercase; margin-bottom: 10px; flex-shrink: 0;
  }
  .grid-rule { height: 1px; background: #e5e5e5; margin-bottom: 28px; flex-shrink: 0; }
  .title {
    font-size: 60px; font-weight: 900; line-height: 1.0;
    letter-spacing: -0.04em; color: #1a1a1a; margin-bottom: 28px; flex-shrink: 0;
  }
  .panel {
    border: 1px solid #e5e5e5;
    border-left: 4px solid #ff3b30;
    flex: 1; display: flex; flex-direction: column;
    background: #fafafa; padding: 32px 44px;
  }
  .panel-eyebrow {
    font-size: 11px; font-weight: 500; letter-spacing: 0.22em;
    color: #ff3b30; text-transform: uppercase; margin-bottom: 10px;
  }
  .panel-eyebrow:empty { display: none; }
  .panel-title {
    font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 20px;
  }
  .panel-title:empty { display: none; margin-bottom: 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; flex: 1; }
  .kp-item {
    display: flex; align-items: center; gap: 20px;
    font-size: {{KP_FONT_SIZE}}px; line-height: 1.45; color: #333;
    flex: 1; border-bottom: 1px solid #e5e5e5;
  }
  .kp-item:last-child { border-bottom: none; }
  .kp-arrow {
    flex-shrink: 0; width: {{KP_DOT_SIZE}}px; height: {{KP_DOT_SIZE}}px;
    background: #ff3b30;
  }
  .bottom-rule { height: 1px; background: #e5e5e5; position: absolute; bottom: 52px; left: 120px; right: 80px; }
  .page-num { position: absolute; bottom: 28px; right: 80px; font-size: 12px; color: #aaa; letter-spacing: 0.1em; }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="left-bar"></div>
<div class="main">
  <div class="eyebrow">{{EYEBROW}}</div>
  <div class="grid-rule"></div>
  <h1 class="title">{{TITLE}}</h1>
  <div class="panel">
    <div class="panel-eyebrow">{{PANEL_EYEBROW}}</div>
    <div class="panel-title">{{PANEL_TITLE}}</div>
    <ul class="kp-list">
      {{KEY_POINTS_HTML}}
    </ul>
  </div>
</div>
<div class="bottom-rule"></div>
<span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
