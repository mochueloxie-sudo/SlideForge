<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; background: #ffffff; font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', sans-serif; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .top-bar { width: 100%; height: 6px; background: #ff3b30; flex-shrink: 0; }
  .left-bar { position: absolute; left: 80px; top: 6px; bottom: 0; width: 4px; background: #ff3b30; }
  .main { flex: 1; padding: 56px 100px 64px 120px; display: flex; flex-direction: column; }
  .eyebrow { font-size: 12px; font-weight: 500; letter-spacing: 0.22em; color: #ff3b30; text-transform: uppercase; margin-bottom: 16px; flex-shrink: 0; }
  .grid-rule { height: 1px; background: #e5e5e5; margin-bottom: 32px; flex-shrink: 0; }
  .panel { border-left: 4px solid #ff3b30; padding: 32px 48px; flex: 1; display: flex; flex-direction: column; justify-content: center; background: #fafafa; }
  .panel-body { font-size: 24px; font-weight: 400; line-height: 1.65; color: #333; }
  .bottom-bar { width: 100%; height: 3px; background: linear-gradient(90deg, #ff3b30, #007aff); flex-shrink: 0; }
  .page-num { position: absolute; bottom: 20px; right: 80px; font-size: 12px; color: #aaa; }
  {{PANEL_CSS}}
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="left-bar"></div>
<div class="main">
  <div class="eyebrow">{{EYEBROW}}</div>
  <div class="grid-rule"></div>
  <div class="panel">
    <div class="panel-body">{{PANEL_BODY}}</div>
  </div>
</div>
<div class="bottom-bar"></div>
<span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
