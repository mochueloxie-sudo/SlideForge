<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; background: #ffffff; font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', sans-serif; color: #1a1a1a; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .top-bar { width: 100%; height: 6px; background: #ff3b30; flex-shrink: 0; }
  .left-bar { position: absolute; left: 80px; top: 6px; bottom: 0; width: 4px; background: #ff3b30; }
  .main { flex: 1; padding: 48px 100px 64px 120px; display: flex; flex-direction: column; }
  .eyebrow { font-size: 12px; font-weight: 500; letter-spacing: 0.22em; color: #ff3b30; text-transform: uppercase; margin-bottom: 10px; flex-shrink: 0; }
  .title { font-size: 56px; font-weight: 900; line-height: 1.0; letter-spacing: -0.04em; color: #1a1a1a; margin-bottom: 28px; flex-shrink: 0; }
  .table-wrap { flex: 1; min-height: 0; border: 1px solid #e5e5e5; overflow: hidden; display: flex; flex-direction: column; }
  table { width: 100%; border-collapse: collapse; flex: 1; display: flex; flex-direction: column; }
  thead { flex-shrink: 0; }
  thead tr { background: #f5f5f5; display: flex; }
  thead th { flex: 1; padding: 0 28px; height: {{TABLE_HEADER_HEIGHT}}px; display: flex; align-items: center; font-size: {{TABLE_TH_FONT}}px; font-weight: 600; color: #ff3b30; letter-spacing: 0.10em; border-bottom: 2px solid #ff3b30; text-transform: uppercase; font-size: 12px; }
  tbody { flex: 1; display: flex; flex-direction: column; }
  tbody tr { flex: 1; display: flex; }
  tbody tr:nth-child(odd)  { background: #ffffff; }
  tbody tr:nth-child(even) { background: #fafafa; }
  tbody td { flex: 1; padding: 0 28px; font-size: {{TABLE_FONT_SIZE}}px; color: #333; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; }
  tbody tr:last-child td { border-bottom: none; }
  .bottom-bar { width: 100%; height: 3px; background: linear-gradient(90deg, #ff3b30, #007aff); flex-shrink: 0; }
  .page-num { position: absolute; bottom: 20px; right: 80px; font-size: 12px; color: #aaa; }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="left-bar"></div>
<div class="main">
  <div class="eyebrow">{{EYEBROW}}</div>
  <h1 class="title">{{TITLE}}</h1>
  <div class="table-wrap">
    <table>
      <thead><tr>{{TABLE_HEADERS}}</tr></thead>
      <tbody>{{TABLE_ROWS}}</tbody>
    </table>
  </div>
</div>
<div class="bottom-bar"></div>
<span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
