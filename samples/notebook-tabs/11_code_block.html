<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,700&family=DM+Sans:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; background: #2d2d2d; font-family: 'DM Sans', 'PingFang SC', sans-serif; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .paper { position: relative; width: 1720px; height: 900px; background: #f8f6f1; padding: 72px 100px 72px 130px; box-shadow: 0 8px 48px rgba(0,0,0,0.45); display: flex; flex-direction: column; }
  .tabs { position: absolute; left: -18px; top: 0; bottom: 0; display: flex; flex-direction: column; justify-content: center; }
  .tab { width: 18px; height: 140px; border-radius: 6px 0 0 6px; margin: 8px 0; }
  .tab-1 { background: #98d4bb; width: 24px; } .tab-2 { background: #c7b8ea; } .tab-3 { background: #f4b8c5; } .tab-4 { background: #a8d8ea; } .tab-5 { background: #ffe6a7; }
  .eyebrow { font-size: 12px; font-weight: 500; letter-spacing: 0.22em; color: #98d4bb; text-transform: uppercase; margin-bottom: 12px; flex-shrink: 0; }
  .title { font-family: 'Bodoni Moda', Georgia, serif; font-size: 52px; font-weight: 700; line-height: 1.08; color: #1a1a1a; margin-bottom: 24px; flex-shrink: 0; }
  .code-wrap { flex: 1; min-height: 0; background: #ffffff; border: 1px solid #d8d2c8; border-left: 4px solid #98d4bb; border-radius: 4px; overflow: hidden; display: flex; flex-direction: column; }
  .code-header { display: flex; align-items: center; gap: 8px; padding: 12px 18px; border-bottom: 1px solid #e8e4dc; background: #f0ede8; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot-r { background: #ff5f57; } .dot-y { background: #febc2e; } .dot-g { background: #28c840; }
  .code-lang { margin-left: auto; font-size: 11px; color: #98d4bb; font-family: 'Courier New', monospace; letter-spacing: 0.10em; font-weight: 500; }
  .code-body { flex: 1; padding: 24px 32px; overflow: hidden; font-family: 'Courier New', monospace; font-size: 18px; line-height: 1.75; color: #2c2c2c; white-space: pre; }
  .hairline { position: absolute; bottom: 56px; left: 130px; right: 80px; height: 1px; background: #d8d2c8; }
  .page-num { position: absolute; bottom: 32px; right: 60px; font-size: 12px; color: #b0aa9e; letter-spacing: 0.1em; }
</style>
</head>
<body>
<div class="paper">
  <div class="tabs"><div class="tab tab-1"></div><div class="tab tab-2"></div><div class="tab tab-3"></div><div class="tab tab-4"></div><div class="tab tab-5"></div></div>
  <div class="eyebrow">{{EYEBROW}}</div>
  <div class="title">{{TITLE}}</div>
  <div class="code-wrap">
    <div class="code-header">
      <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
      <span class="code-lang">{{CODE_LABEL}}</span>
    </div>
    <div class="code-body">{{CODE_SNIPPET}}</div>
  </div>
  <div class="hairline"></div>
  <span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</div>
</body>
</html>
