<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,700&family=DM+Sans:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; background: #2d2d2d; font-family: 'DM Sans', 'PingFang SC', sans-serif; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .paper { position: relative; width: 1720px; height: 900px; background: #f8f6f1; padding: 64px 100px 72px 130px; box-shadow: 0 8px 48px rgba(0,0,0,0.45); display: flex; flex-direction: column; }
  .tabs { position: absolute; left: -18px; top: 0; bottom: 0; display: flex; flex-direction: column; justify-content: center; }
  .tab { width: 18px; height: 140px; border-radius: 6px 0 0 6px; margin: 8px 0; }
  .tab-1 { background: #98d4bb; width: 24px; } .tab-2 { background: #c7b8ea; } .tab-3 { background: #f4b8c5; } .tab-4 { background: #a8d8ea; } .tab-5 { background: #ffe6a7; }
  .eyebrow { font-size: 12px; font-weight: 500; letter-spacing: 0.22em; color: #98d4bb; text-transform: uppercase; margin-bottom: 10px; flex-shrink: 0; }
  .title { font-family: 'Bodoni Moda', Georgia, serif; font-size: 52px; font-weight: 700; line-height: 1.08; color: #1a1a1a; margin-bottom: 28px; flex-shrink: 0; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; flex: 1; }
  /* card styles injected via {{CARDS_HTML}} */
  .card { background: #ffffff; border: 1px solid #d8d2c8; border-top: 3px solid #98d4bb; border-radius: 4px; padding: 32px 30px; display: flex; flex-direction: column; }
  .card:nth-child(2n) { border-top-color: #c7b8ea; }
  .card:nth-child(3n) { border-top-color: #f4b8c5; }
  .card-icon { font-size: 28px; margin-bottom: 14px; }
  .card-title { font-family: 'Bodoni Moda', serif; font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 10px; line-height: 1.3; }
  .card-body { font-size: 15px; color: #777; line-height: 1.65; flex: 1; }
  .card-tag { display: inline-block; margin-top: 16px; font-size: 11px; letter-spacing: 0.10em; color: #98d4bb; border: 1px solid #d8d2c8; border-radius: 3px; padding: 2px 8px; text-transform: uppercase; }
  .hairline { position: absolute; bottom: 52px; left: 130px; right: 80px; height: 1px; background: #d8d2c8; }
  .page-num { position: absolute; bottom: 28px; right: 60px; font-size: 12px; color: #b0aa9e; letter-spacing: 0.1em; }

  /* card-label: small category text above card title */
  .card-label {
    font-size: 12px; font-weight: 600; letter-spacing: 0.16em;
    text-transform: uppercase; opacity: 0.55; margin-bottom: 10px;
  }
  /* layout-2x2: 2-column card grid */
  body.layout-2x2 .grid {
    grid-template-columns: 1fr 1fr !important;
    max-width: 1520px !important;
    gap: 28px !important;
  }
  body.layout-2x2 .card  { padding: 44px 40px !important; }
  body.layout-2x2 .card-icon  { font-size: 44px !important; }
  body.layout-2x2 .card-title { font-size: 28px !important; }
  body.layout-2x2 .card-body  { font-size: 19px !important; }
  body.layout-2x2 .card-label { font-size: 13px !important; }
</style>
</head>
<body>
<div class="paper">
  <div class="tabs"><div class="tab tab-1"></div><div class="tab tab-2"></div><div class="tab tab-3"></div><div class="tab tab-4"></div><div class="tab tab-5"></div></div>
  <div class="eyebrow">{{EYEBROW}}</div>
  <h1 class="title">{{TITLE}}</h1>
  <div class="grid">{{CARDS_HTML}}</div>
  <div class="hairline"></div>
  <span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</div>
</body>
</html>
