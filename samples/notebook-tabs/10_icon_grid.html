<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700&family=DM+Sans:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { width: 1920px; height: 1080px; overflow: hidden; }
  body {
    width: 1920px; height: 1080px;
    background: #2d2d2d;
    font-family: 'DM Sans', 'PingFang SC', sans-serif;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .paper {
    position: relative;
    width: 1720px; height: 900px;
    background: #f8f6f1;
    padding: 64px 80px 64px 130px;
    box-shadow: 0 8px 48px rgba(0,0,0,0.45);
    display: flex; flex-direction: column;
  }
  .tabs {
    position: absolute; left: -18px; top: 0; bottom: 0;
    display: flex; flex-direction: column; justify-content: center;
  }
  .tab { width: 18px; height: 140px; border-radius: 6px 0 0 6px; margin: 8px 0; }
  .tab-1 { background: #98d4bb; width: 24px; }
  .tab-2 { background: #c7b8ea; }
  .tab-3 { background: #f4b8c5; }
  .tab-4 { background: #a8d8ea; }
  .tab-5 { background: #ffe6a7; }
  .eyebrow {
    font-size: 12px; font-weight: 500; letter-spacing: 0.22em;
    color: #98d4bb; text-transform: uppercase; margin-bottom: 12px; flex-shrink: 0;
  }
  .rule { width: 40px; height: 2px; background: #98d4bb; margin-bottom: 18px; flex-shrink: 0; }
  .title {
    font-family: 'Bodoni Moda', Georgia, serif;
    font-size: 48px; font-weight: 700; line-height: 1.1;
    color: #1a1a1a; margin-bottom: 32px; flex-shrink: 0;
  }
  .grid {
    flex: 1; min-height: 0;
    display: grid;
    grid-template-columns: repeat({{ICON_GRID_COLS}}, 1fr);
    max-width: {{ICON_GRID_MAX_WIDTH}}px;
    width: 100%;
    margin: 0 auto;
    align-self: center;
    gap: 16px;
    align-content: center;
  }
  /* Cycle tab colors for card top accents */
  .icon-card {
    min-height: {{ICON_CARD_MIN_HEIGHT}}px;
    padding: 32px 20px; --card-accent: #98d4bb; }
  .icon-card:nth-child(6n+2) { --card-accent: #c7b8ea; }
  .icon-card:nth-child(6n+3) { --card-accent: #f4b8c5; }
  .icon-card:nth-child(6n+4) { --card-accent: #a8d8ea; }
  .icon-card:nth-child(6n+5) { --card-accent: #ffe6a7; }
  .icon-card:nth-child(6n+6) { --card-accent: #98d4bb; }
  .icon-card {
    background: #ffffff;
    border: 1px solid #d8d2c8;
    border-top: 3px solid var(--card-accent);
    border-radius: 6px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .icon-emoji { font-size: {{ICON_EMOJI_SIZE}}px; line-height: 1; }
  .icon-label { font-size: {{ICON_LABEL_SIZE}}px; font-weight: 500; color: #3a3a3a; text-align: center; line-height: 1.4; padding: 0 12px; }
  .hairline {
    position: absolute; bottom: 56px; left: 130px; right: 80px;
    height: 1px; background: #d8d2c8;
  }
  .page-num {
    position: absolute; bottom: 32px; right: 60px;
    font-size: 12px; color: #b0aa9e; letter-spacing: 0.1em;
  }
  .icon-desc {
    font-size: 17px; line-height: 1.55;
    color: rgba(176,170,158,0.80);
    text-align: center;
    padding: 0 8px;
    margin-top: 2px;
  }
</style>
</head>
<body>
<div class="paper">
  <div class="tabs">
    <div class="tab tab-1"></div><div class="tab tab-2"></div>
    <div class="tab tab-3"></div><div class="tab tab-4"></div>
    <div class="tab tab-5"></div>
  </div>
  <div class="eyebrow">{{EYEBROW}}</div>
  <div class="rule"></div>
  <h1 class="title">{{TITLE}}</h1>
  <div class="grid">{{ICONS_HTML}}</div>
  <div class="hairline"></div>
  <span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</div>
</body>
</html>
