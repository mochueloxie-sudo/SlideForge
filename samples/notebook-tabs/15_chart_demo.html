<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700&family=DM+Sans:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { width: 1920px; height: 1080px; overflow: hidden; }
  body {
    width: 1920px; height: 1080px;
    background: #2d2d2d;
    font-family: 'DM Sans', 'PingFang SC', sans-serif;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .paper {
    position: relative;
    width: 1720px; height: 900px;
    background: #f8f6f1;
    padding: 64px 80px 64px 130px;
    box-shadow: 0 8px 48px rgba(0,0,0,0.45);
    display: flex; flex-direction: column;
  }
  .tabs {
    position: absolute; left: -18px; top: 0; bottom: 0;
    display: flex; flex-direction: column; justify-content: center;
  }
  .tab { width: 18px; height: 140px; border-radius: 6px 0 0 6px; margin: 8px 0; }
  .tab-1 { background: #98d4bb; width: 24px; }
  .tab-2 { background: #c7b8ea; }
  .tab-3 { background: #f4b8c5; }
  .tab-4 { background: #a8d8ea; }
  .tab-5 { background: #ffe6a7; }
  .title {
    font-family: 'Bodoni Moda', Georgia, serif;
    font-size: 48px; font-weight: 700; line-height: 1.1;
    color: #1a1a1a; margin-bottom: 8px; flex-shrink: 0;
  }
  .subtitle { font-size: 17px; color: #6b6b6b; margin-bottom: 44px; flex-shrink: 0; }
  .chart-area {
    display: flex; align-items: flex-end; gap: 32px;
    flex: 1; min-height: 260px; padding-bottom: 32px;
    border-bottom: 1px solid #d8d2c8;
    max-width: 1100px;
  }
  .bar-group { display: flex; flex-direction: column; align-items: center; gap: 10px; flex: 1; }
  .bar-wrap { display: flex; align-items: flex-end; gap: 8px; height: 240px; }
  .bar { width: 44px; border-radius: 4px 4px 0 0; position: relative; }
  .bar-blue { background: linear-gradient(180deg, #98d4bb, #6bbda3); }
  .bar-purple { background: linear-gradient(180deg, #c7b8ea, #a89bd0); }
  .bar-val { position: absolute; top: -24px; left: 50%; transform: translateX(-50%); font-size: 13px; font-weight: 700; color: #6b6b6b; white-space: nowrap; }
  .bar-label { font-size: 13px; color: #6b6b6b; text-align: center; margin-top: 8px; }
  .stats-row { display: flex; gap: 48px; margin-top: 36px; }
  .stat-val { font-family: 'Bodoni Moda', Georgia, serif; font-size: 44px; font-weight: 700; color: #98d4bb; line-height: 1; }
  .stat-label { font-size: 14px; color: #6b6b6b; margin-top: 6px; }
  .legend { display: flex; gap: 28px; margin-top: 28px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #6b6b6b; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
  .legend-dot-blue { background: #98d4bb; }
  .legend-dot-purple { background: #c7b8ea; }
  .hairline {
    position: absolute; bottom: 56px; left: 130px; right: 80px;
    height: 1px; background: #d8d2c8;
  }
  .page-num {
    position: absolute; bottom: 32px; right: 60px;
    font-size: 12px; color: #b0aa9e; letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<div class="paper">
  <div class="tabs">
    <div class="tab tab-1"></div><div class="tab tab-2"></div>
    <div class="tab tab-3"></div><div class="tab tab-4"></div>
    <div class="tab tab-5"></div>
  </div>
  <div class="title">{{TITLE}}</div>
  <div class="subtitle">{{SUBTITLE}}</div>
  <div class="chart-area">
{{CHART_BARS_HTML}}
  </div>
  <div class="legend">
{{CHART_LEGEND_HTML}}
  </div>
  <div class="stats-row">
{{CHART_STATS_HTML}}
  </div>
  <div class="hairline"></div>
  <span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</div>
</body>
</html>
