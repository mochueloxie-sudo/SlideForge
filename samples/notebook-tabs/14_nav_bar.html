<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700&family=DM+Sans:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { width: 1920px; height: 1080px; overflow: hidden; }
  body {
    width: 1920px; height: 1080px;
    background: #2d2d2d;
    font-family: 'DM Sans', 'PingFang SC', sans-serif;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .paper {
    position: relative;
    width: 1720px; height: 900px;
    background: #f8f6f1;
    box-shadow: 0 8px 48px rgba(0,0,0,0.45);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .tabs {
    position: absolute; left: -18px; top: 0; bottom: 0;
    display: flex; flex-direction: column; justify-content: center;
    z-index: 10;
  }
  .tab { width: 18px; height: 140px; border-radius: 6px 0 0 6px; margin: 8px 0; }
  .tab-1 { background: #98d4bb; width: 24px; }
  .tab-2 { background: #c7b8ea; }
  .tab-3 { background: #f4b8c5; }
  .tab-4 { background: #a8d8ea; }
  .tab-5 { background: #ffe6a7; }
  /* Top nav */
  .topbar {
    background: #ffffff;
    border-bottom: 2px solid #98d4bb;
    padding: 0 64px 0 130px;
    height: 68px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .logo { font-family: 'Bodoni Moda', Georgia, serif; font-size: 18px; font-weight: 700; color: #1a1a1a; }
  .logo span { color: #98d4bb; }
  .nav-items { display: flex; gap: 36px; align-items: center; }
  .nav-item { font-size: 14px; color: #6b6b6b; }
  .nav-item.active { color: #98d4bb; font-weight: 600; }
  .nav-item.active::after { content: ''; display: block; height: 2px; background: #98d4bb; margin-top: 3px; border-radius: 1px; }
  /* Progress */
  .progress-bar { height: 3px; background: #ece8e0; flex-shrink: 0; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #98d4bb, #c7b8ea); }
  /* Content */
  .content {
    flex: 1; padding: 60px 64px 0 130px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .section-label { font-size: 12px; color: #98d4bb; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 18px; }
  .title {
    font-family: 'Bodoni Moda', Georgia, serif;
    font-size: 56px; font-weight: 700; line-height: 1.1;
    color: #1a1a1a; margin-bottom: 22px;
  }
  .body-text { font-size: 20px; line-height: 1.7; color: #6b6b6b; max-width: 800px; }
  /* Bottom */
  .bottombar {
    padding: 0 64px 28px 130px;
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
  }
  .bottom-text { font-size: 12px; color: #b0aa9e; letter-spacing: 0.1em; }
  .page-num { font-size: 12px; color: #b0aa9e; letter-spacing: 0.1em; }
</style>
</head>
<body>
<div class="paper">
  <div class="tabs">
    <div class="tab tab-1"></div><div class="tab tab-2"></div>
    <div class="tab tab-3"></div><div class="tab tab-4"></div>
    <div class="tab tab-5"></div>
  </div>
  <div class="topbar">
    <div class="logo">{{NAV_LOGO_A}}<span>{{NAV_LOGO_B}}</span></div>
    <div class="nav-items">
{{NAV_ITEMS_HTML}}
    </div>
    <div style="font-size:13px;color:#6b6b6b">{{AUTHOR_DATE}}</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" style="width:{{PROGRESS_PCT}}%"></div></div>
  <div class="content">
    <div class="section-label">{{SECTION_LABEL}}</div>
    <h1 class="title">{{TITLE}}</h1>
    <p class="body-text">{{SUBTITLE}}</p>
  </div>
  <div class="bottombar">
    <div class="bottom-text">{{BOTTOM_TEXT}}</div>
    <div class="page-num">{{PAGE_NUM}} / {{TOTAL}}</div>
  </div>
</div>
</body>
</html>
