<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,700&family=DM+Sans:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; background: #2d2d2d; font-family: 'DM Sans', 'PingFang SC', sans-serif; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .paper { position: relative; width: 1720px; height: 900px; background: #f8f6f1; padding: 64px 100px 80px 130px; box-shadow: 0 8px 48px rgba(0,0,0,0.45); display: flex; flex-direction: column; }
  .tabs { position: absolute; left: -18px; top: 0; bottom: 0; display: flex; flex-direction: column; justify-content: center; }
  .tab { width: 18px; height: 140px; border-radius: 6px 0 0 6px; margin: 8px 0; }
  .tab-1 { background: #98d4bb; width: 24px; } .tab-2 { background: #c7b8ea; } .tab-3 { background: #f4b8c5; } .tab-4 { background: #a8d8ea; } .tab-5 { background: #ffe6a7; }
  .eyebrow { font-size: 12px; font-weight: 500; letter-spacing: 0.22em; color: #98d4bb; text-transform: uppercase; margin-bottom: 10px; flex-shrink: 0; }
  .title { font-family: 'Bodoni Moda', Georgia, serif; font-size: 52px; font-weight: 700; line-height: 1.08; color: #1a1a1a; margin-bottom: 28px; flex-shrink: 0; }
  .table-wrap { flex: 1; min-height: 0; border: 1px solid #d8d2c8; border-radius: 4px; border-top: 3px solid #98d4bb; overflow: hidden; display: flex; flex-direction: column; }
  table { width: 100%; border-collapse: collapse; flex: 1; display: flex; flex-direction: column; }
  thead { flex-shrink: 0; }
  thead tr { background: #f0ede8; display: flex; }
  thead th { flex: 1; padding: 0 28px; height: {{TABLE_HEADER_HEIGHT}}px; display: flex; align-items: center; font-size: {{TABLE_TH_FONT}}px; font-weight: 600; color: #6b6b6b; letter-spacing: 0.08em; border-bottom: 1px solid #d8d2c8; text-transform: uppercase; font-size: 12px; }
  tbody { flex: 1; display: flex; flex-direction: column; }
  tbody tr { flex: 1; display: flex; }
  tbody tr:nth-child(odd)  { background: #ffffff; }
  tbody tr:nth-child(even) { background: #faf8f4; }
  tbody td { flex: 1; padding: 0 28px; font-size: {{TABLE_FONT_SIZE}}px; color: #3a3a3a; border-bottom: 1px solid #ece8e0; display: flex; align-items: center; }
  tbody tr:last-child td { border-bottom: none; }
  .hairline { position: absolute; bottom: 56px; left: 130px; right: 80px; height: 1px; background: #d8d2c8; }
  .page-num { position: absolute; bottom: 32px; right: 60px; font-size: 12px; color: #b0aa9e; letter-spacing: 0.1em; }
</style>
</head>
<body>
<div class="paper">
  <div class="tabs"><div class="tab tab-1"></div><div class="tab tab-2"></div><div class="tab tab-3"></div><div class="tab tab-4"></div><div class="tab tab-5"></div></div>
  <div class="eyebrow">{{EYEBROW}}</div>
  <h1 class="title">{{TITLE}}</h1>
  <div class="table-wrap">
    <table>
      <thead><tr>{{TABLE_HEADERS}}</tr></thead>
      <tbody>{{TABLE_ROWS}}</tbody>
    </table>
  </div>
  <div class="hairline"></div>
  <span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</div>
</body>
</html>
