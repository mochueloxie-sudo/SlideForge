<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; background: #f5f3ee; font-family: Georgia, serif; padding: 64px 140px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .frame { position: absolute; inset: 16px; border: 1px solid #d4d0c8; pointer-events: none; }
  .eyebrow { font-size: 11px; letter-spacing: 0.26em; color: #8b7355; text-transform: uppercase; margin-bottom: 10px; flex-shrink: 0; }
  .title { font-family: 'Playfair Display', Georgia, serif; font-size: 56px; font-weight: 700; line-height: 1.1; color: #2c2c2c; margin-bottom: 20px; flex-shrink: 0; }
  .code-wrap { flex: 1; min-height: 0; background: #ece9e2; border: 1px solid #d4d0c8; border-left: 3px solid #8b7355; overflow: hidden; display: flex; flex-direction: column; }
  .code-header { display: flex; align-items: center; gap: 8px; padding: 12px 18px; border-bottom: 1px solid #d4d0c8; background: #e5e1d8; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot-r { background: #ff5f57; } .dot-y { background: #febc2e; } .dot-g { background: #28c840; }
  .code-lang { margin-left: auto; font-size: 11px; color: #8b7355; font-family: 'Courier New', monospace; letter-spacing: 0.10em; }
  .code-body { flex: 1; padding: 24px 36px; overflow: hidden; font-family: 'Courier New', monospace; font-size: 17px; line-height: 1.80; color: #2c2c2c; white-space: pre; }
  .hairline { position: absolute; bottom: 60px; left: 140px; right: 140px; height: 1px; background: #d4d0c8; }
  .page-num { position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%); font-size: 12px; color: #b0aa9e; letter-spacing: 0.15em; }
</style>
</head>
<body>
<div class="frame"></div>
<div class="eyebrow">{{EYEBROW}}</div>
<div class="title">{{TITLE}}</div>
<div class="code-wrap">
  <div class="code-header">
    <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
    <span class="code-lang">{{CODE_LABEL}}</span>
  </div>
  <div class="code-body">{{CODE_SNIPPET}}</div>
</div>
<div class="hairline"></div>
<div class="page-num">— {{PAGE_NUM}} / {{TOTAL}} —</div>
</body>
</html>
