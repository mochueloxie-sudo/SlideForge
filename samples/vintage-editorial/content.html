<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; background: #f5f3ee; font-family: Georgia, serif; padding: 64px 140px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .frame { position: absolute; inset: 16px; border: 1px solid #d4d0c8; pointer-events: none; }
  .eyebrow { font-size: 11px; letter-spacing: 0.26em; color: #8b7355; text-transform: uppercase; margin-bottom: 16px; flex-shrink: 0; }
  .deco { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; flex-shrink: 0; }
  .deco .l { width: 40px; height: 1px; background: #d4d0c8; } .deco .s { color: #8b7355; font-size: 11px; }
  .panel { background: #faf8f4; border: 1px solid #d4d0c8; border-left: 3px solid #8b7355; padding: 40px 52px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .panel-body { font-size: 22px; font-weight: 400; line-height: 1.85; color: #4a4540; font-style: italic; }
  .hairline { position: absolute; bottom: 60px; left: 140px; right: 140px; height: 1px; background: #d4d0c8; }
  .page-num { position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%); font-size: 12px; color: #b0aa9e; letter-spacing: 0.15em; }
  {{PANEL_CSS}}
</style>
</head>
<body>
<div class="frame"></div>
<div class="eyebrow">{{EYEBROW}}</div>
<div class="deco"><div class="l"></div><span class="s">✦</span></div>
<div class="panel">
  <div class="panel-body">{{PANEL_BODY}}</div>
</div>
<div class="hairline"></div>
<div class="page-num">— {{PAGE_NUM}} / {{TOTAL}} —</div>
</body>
</html>
