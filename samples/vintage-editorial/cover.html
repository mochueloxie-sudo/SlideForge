<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: #f5f3ee;
    font-family: Georgia, 'Times New Roman', serif;
    color: #2c2c2c;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .frame {
    position: absolute; inset: 20px;
    border: 1px solid #d4d0c8;
    pointer-events: none;
  }
  .frame-inner {
    position: absolute; inset: 26px;
    border: 1px solid rgba(212,208,200,0.5);
    pointer-events: none;
  }
  .content {
    text-align: center;
    max-width: 1100px;
    padding: 0 120px;
    position: relative; z-index: 2;
  }
  .eyebrow {
    font-family: Georgia, serif;
    font-size: 12px; font-weight: 400; letter-spacing: 0.30em;
    color: #8b7355; text-transform: uppercase;
    margin-bottom: 24px;
  }
  .ornamental-rule {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 40px; justify-content: center;
  }
  .ornamental-rule .line { flex: 1; max-width: 180px; height: 1px; background: #d4d0c8; }
  .ornamental-rule .star { color: #8b7355; font-size: 14px; }
  .title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 88px; font-weight: 700; line-height: 1.1;
    letter-spacing: -0.01em; color: #2c2c2c;
    margin-bottom: 32px; font-style: italic;
  }
  .rule { width: 80px; height: 1px; background: #8b7355; margin: 0 auto 32px; }
  .subtitle {
    font-family: Georgia, serif;
    font-size: 22px; font-weight: 400; line-height: 1.65;
    color: #6b6560; max-width: 680px; margin: 0 auto;
    font-style: italic;
  }
  .page-num {
    position: absolute; bottom: 40px;
    left: 50%; transform: translateX(-50%);
    font-size: 12px; color: #b0aa9e; letter-spacing: 0.15em;
  }
</style>
</head>
<body>
<div class="frame"></div>
<div class="frame-inner"></div>
<div class="content">
  <div class="eyebrow">{{EYEBROW}}</div>
  <div class="ornamental-rule">
    <div class="line"></div>
    <span class="star">✦</span>
    <div class="line"></div>
  </div>
  <h1 class="title">{{TITLE}}</h1>
  <div class="rule"></div>
  <p class="subtitle">{{SUBTITLE}}</p>
</div>
<div class="page-num">— {{PAGE_NUM}} / {{TOTAL}} —</div>
</body>
</html>
