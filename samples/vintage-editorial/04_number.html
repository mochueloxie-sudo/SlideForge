<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: #f5f3ee;
    font-family: Georgia, serif;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .frame { position: absolute; inset: 16px; border: 1px solid #d4d0c8; pointer-events: none; }
  .center { text-align: center; position: relative; z-index: 2; }
  .rule-double {
    width: 180px; height: 6px; margin: 0 auto 44px;
    border-top: 2px solid #2c2c2c; border-bottom: 1px solid #8b7355;
  }
  .number {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 190px; font-weight: 700; line-height: 1;
    color: #c9a96e; letter-spacing: -0.02em; font-style: italic;
  }
  .unit { font-size: 56px; font-weight: 400; color: #8b7355; margin-left: 4px; }
  .ornamental { color: #8b7355; font-size: 16px; letter-spacing: 0.4em; margin: 36px 0 24px; opacity: 0.7; }
  .label { font-family: Georgia, serif; font-size: 26px; font-weight: 400; color: #6b6560; max-width: 600px; line-height: 1.55; font-style: italic; }
  .rule-bottom { width: 180px; height: 1px; background: #d4d0c8; margin: 36px auto 0; }
  .page-num { position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%); font-size: 12px; color: #b0aa9e; letter-spacing: 0.15em; }
</style>
</head>
<body>
<div class="frame"></div>
<div class="center">
  <div class="rule-double"></div>
  <div class="number">{{BIG_NUMBER}}<span class="unit">{{NUMBER_UNIT}}</span></div>
  <div class="ornamental">✦ ✦ ✦</div>
  <div class="label">{{TITLE}}</div>
  <div class="rule-bottom"></div>
</div>
<div class="page-num">— {{PAGE_NUM}} / {{TOTAL}} —</div>
</body>
</html>
