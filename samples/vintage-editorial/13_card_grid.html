<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; background: #f5f3ee; font-family: Georgia, serif; padding: 56px 140px 68px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .frame { position: absolute; inset: 16px; border: 1px solid #d4d0c8; pointer-events: none; }
  .eyebrow { font-size: 11px; letter-spacing: 0.26em; color: #8b7355; text-transform: uppercase; margin-bottom: 10px; flex-shrink: 0; }
  .title { font-family: 'Playfair Display', Georgia, serif; font-size: 52px; font-weight: 700; line-height: 1.1; color: #2c2c2c; margin-bottom: 24px; flex-shrink: 0; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; flex: 1; }
  .card { border: 1px solid #d4d0c8; padding: 28px 26px; display: flex; flex-direction: column; background: transparent; }
  .card-icon { font-size: 22px; margin-bottom: 12px; color: #8b7355; }
  .card-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: #2c2c2c; margin-bottom: 10px; line-height: 1.3; }
  .card-body { font-size: 15px; color: #6b6560; line-height: 1.7; flex: 1; }
  .rule { width: 24px; height: 1px; background: #c9a96e; margin: 14px 0 8px; }
  .card-tag { font-size: 11px; letter-spacing: 0.12em; color: #8b7355; text-transform: uppercase; font-style: italic; }
  .hairline { position: absolute; bottom: 56px; left: 140px; right: 140px; height: 1px; background: #d4d0c8; }
  .page-num { position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%); font-size: 12px; color: #b0aa9e; letter-spacing: 0.15em; }

  /* card-label: small category text above card title */
  .card-label {
    font-size: 12px; font-weight: 600; letter-spacing: 0.16em;
    text-transform: uppercase; opacity: 0.55; margin-bottom: 10px;
  }
  /* layout-2x2: 2-column card grid */
  body.layout-2x2 .grid {
    grid-template-columns: 1fr 1fr !important;
    max-width: 1520px !important;
    gap: 28px !important;
  }
  body.layout-2x2 .card  { padding: 44px 40px !important; }
  body.layout-2x2 .card-icon  { font-size: 44px !important; }
  body.layout-2x2 .card-title { font-size: 28px !important; }
  body.layout-2x2 .card-body  { font-size: 19px !important; }
  body.layout-2x2 .card-label { font-size: 13px !important; }
</style>
</head>
<body>
<div class="frame"></div>
<div class="eyebrow">{{EYEBROW}}</div>
<h1 class="title">{{TITLE}}</h1>
<div class="grid">{{CARDS_HTML}}</div>
<div class="hairline"></div>
<div class="page-num">— {{PAGE_NUM}} / {{TOTAL}} —</div>
</body>
</html>
