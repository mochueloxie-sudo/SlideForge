<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{QUOTE_SOURCE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: #f5f3ee;
    font-family: Georgia, serif;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .frame { position: absolute; inset: 16px; border: 1px solid #d4d0c8; pointer-events: none; }
  .content { text-align: center; max-width: 1300px; padding: 0 80px; position: relative; z-index: 2; }
  .rule-top { display: flex; align-items: center; gap: 16px; justify-content: center; margin-bottom: 48px; }
  .rule-top .line { width: 120px; height: 1px; background: #d4d0c8; }
  .rule-top .star { color: #8b7355; font-size: 14px; }
  .quote-mark {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 180px; line-height: 0.6; color: rgba(139,115,85,0.20);
    font-style: italic; position: absolute; top: -60px; left: 20px;
  }
  .quote-body {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 44px; font-weight: 400; line-height: 1.55;
    color: #2c2c2c; margin-bottom: 48px; font-style: italic;
    position: relative; z-index: 2;
  }
  .rule-bottom { display: flex; align-items: center; gap: 16px; justify-content: center; margin-bottom: 28px; }
  .rule-bottom .line { width: 80px; height: 1px; background: #d4d0c8; }
  .rule-bottom .dash { color: #8b7355; font-size: 11px; }
  .quote-source { font-size: 16px; font-weight: 400; letter-spacing: 0.12em; color: #8b7355; font-style: italic; }
  .page-num { position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%); font-size: 12px; color: #b0aa9e; letter-spacing: 0.15em; }
</style>
</head>
<body>
<div class="frame"></div>
<div class="content">
  <div class="rule-top"><div class="line"></div><span class="star">✦</span><div class="line"></div></div>
  <div class="quote-mark">"</div>
  <div class="quote-body">{{QUOTE_BODY}}</div>
  <div class="rule-bottom"><div class="line"></div><span class="dash">—</span><div class="line"></div></div>
  <div class="quote-source">{{QUOTE_SOURCE}}</div>
</div>
<div class="page-num">— {{PAGE_NUM}} / {{TOTAL}} —</div>
</body>
</html>
