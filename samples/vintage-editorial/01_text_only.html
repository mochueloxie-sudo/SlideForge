<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: #f5f3ee;
    font-family: Georgia, 'Times New Roman', serif;
    color: #2c2c2c;
    padding: 72px 140px;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; justify-content: flex-start;
  }
  .frame { position: absolute; inset: 16px; border: 1px solid #d4d0c8; pointer-events: none; }
  .eyebrow {
    font-size: 11px; font-weight: 400; letter-spacing: 0.28em;
    color: #8b7355; text-transform: uppercase; margin-bottom: 16px;
  }
  .ornamental-rule {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 36px; max-width: 400px;
  }
  .ornamental-rule .line { flex: 1; height: 1px; background: #d4d0c8; }
  .ornamental-rule .star { color: #8b7355; font-size: 12px; }
  .title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 68px; font-weight: 700; line-height: 1.1;
    letter-spacing: -0.01em; color: #2c2c2c;
    margin-bottom: 44px; max-width: 1100px;
  }
  .body-text {
    font-size: 22px; font-weight: 400; line-height: 1.80;
    color: #4a4540; max-width: 1000px; margin-bottom: 24px;
  }
  .secondary {
    font-size: 20px; font-style: italic; line-height: 1.75;
    color: #7a7068; max-width: 900px;
  }
  .hairline {
    position: absolute; bottom: 68px; left: 140px; right: 140px;
    height: 1px; background: #d4d0c8;
  }
  .page-num {
    position: absolute; bottom: 40px;
    left: 50%; transform: translateX(-50%);
    font-size: 12px; color: #b0aa9e; letter-spacing: 0.15em;
  }
</style>
</head>
<body>
<div class="frame"></div>
<div class="eyebrow">{{EYEBROW}}</div>
<div class="ornamental-rule"><div class="line"></div><span class="star">✦</span><div class="line"></div></div>
<h1 class="title">{{TITLE}}</h1>
<p class="body-text">{{BODY}}</p>
<p class="secondary">{{SECONDARY}}</p>
<div class="hairline"></div>
<div class="page-num">— {{PAGE_NUM}} / {{TOTAL}} —</div>
</body>
</html>
