<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: #fafafa;
    font-family: 'Poppins', 'PingFang SC', sans-serif;
    color: #2d2d2d;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .shape-1 {
    position: absolute; width: 560px; height: 560px;
    background: #ffd6e0; border-radius: 50%;
    top: -160px; right: -80px; opacity: 0.72;
  }
  .shape-2 {
    position: absolute; width: 420px; height: 420px;
    background: #d4f7f2; border-radius: 50%;
    bottom: -100px; left: -60px; opacity: 0.68;
  }
  .shape-3 {
    position: absolute; width: 200px; height: 200px;
    background: #fff3b0; border-radius: 50%;
    top: 180px; right: 340px; opacity: 0.60;
  }
  .shape-4 {
    position: absolute; width: 140px; height: 140px;
    background: #d4e8ff; border-radius: 50%;
    bottom: 140px; left: 400px; opacity: 0.55;
  }
  .content {
    position: relative; z-index: 2;
    text-align: center; max-width: 1100px;
    padding: 0 80px;
  }
  .eyebrow {
    display: inline-block;
    font-size: 13px; font-weight: 600; letter-spacing: 0.20em;
    color: #cc7a9a; text-transform: uppercase;
    background: rgba(255,214,224,0.6);
    border-radius: 100px; padding: 8px 24px;
    margin-bottom: 44px;
  }
  .title {
    font-size: 96px; font-weight: 800; line-height: 1.0;
    letter-spacing: -0.03em; color: #2d2d2d;
    margin-bottom: 36px;
  }
  .dot-row {
    display: flex; justify-content: center; gap: 10px;
    margin-bottom: 36px;
  }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .subtitle {
    font-size: 22px; font-weight: 300; line-height: 1.65;
    color: #888; max-width: 660px; margin: 0 auto;
  }
  .page-num {
    position: absolute; bottom: 48px; right: 100px;
    font-size: 13px; color: #ccc; font-weight: 500;
  }
</style>
</head>
<body>
<div class="shape-1"></div>
<div class="shape-2"></div>
<div class="shape-3"></div>
<div class="shape-4"></div>
<div class="content">
  <div class="eyebrow">{{EYEBROW}}</div>
  <h1 class="title">{{TITLE}}</h1>
  <div class="dot-row">
    <div class="dot" style="background:#ffd6e0"></div>
    <div class="dot" style="background:#d4f7f2"></div>
    <div class="dot" style="background:#fff3b0"></div>
    <div class="dot" style="background:#d4e8ff"></div>
  </div>
  <p class="subtitle">{{SUBTITLE}}</p>
</div>
<span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
