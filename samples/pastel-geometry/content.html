<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; background: #fafafa; font-family: 'Poppins', 'PingFang SC', sans-serif; color: #2d2d2d; padding: 72px 120px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .shape-1 { position: absolute; width: 500px; height: 500px; background: #ffd6e0; border-radius: 50%; top: -150px; right: -70px; opacity: 0.62; }
  .shape-2 { position: absolute; width: 380px; height: 380px; background: #d4f7f2; border-radius: 50%; bottom: -90px; left: -50px; opacity: 0.55; }
  .eyebrow { display: inline-block; font-size: 12px; font-weight: 700; letter-spacing: 0.18em; color: #cc7a9a; text-transform: uppercase; background: rgba(255,214,224,0.55); border-radius: 100px; padding: 5px 18px; margin-bottom: 20px; flex-shrink: 0; position: relative; z-index: 2; }
  .panel { background: #ffffff; border-radius: 20px; border-top: 4px solid #ffd6e0; padding: 44px 56px; flex: 1; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 6px 24px rgba(0,0,0,0.05); position: relative; z-index: 2; }
  .panel-body { font-size: 24px; font-weight: 400; line-height: 1.75; color: #555; }
  .page-num { position: absolute; bottom: 44px; right: 80px; font-size: 13px; color: #ccc; font-weight: 500; }
  {{PANEL_CSS}}
</style>
</head>
<body>
<div class="shape-1"></div>
<div class="shape-2"></div>
<div class="eyebrow">{{EYEBROW}}</div>
<div class="panel">
  <div class="panel-body">{{PANEL_BODY}}</div>
</div>
<span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
