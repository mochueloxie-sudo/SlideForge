<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{QUOTE_SOURCE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: #fafafa;
    font-family: 'Poppins', 'PingFang SC', sans-serif;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .shape-1 { position: absolute; width: 560px; height: 560px; background: #ffd6e0; border-radius: 50%; top: -180px; right: -80px; opacity: 0.68; }
  .shape-2 { position: absolute; width: 420px; height: 420px; background: #d4f7f2; border-radius: 50%; bottom: -100px; left: -60px; opacity: 0.62; }
  .shape-3 { position: absolute; width: 200px; height: 200px; background: #fff3b0; border-radius: 50%; bottom: 160px; right: 320px; opacity: 0.55; }
  .content { position: relative; z-index: 2; text-align: center; max-width: 1380px; padding: 0 80px; }
  .quote-mark { font-size: 160px; font-weight: 800; color: #ffd6e0; line-height: 0.8; margin-bottom: 8px; }
  .quote-body { font-size: 42px; font-weight: 600; line-height: 1.5; color: #2d2d2d; margin-bottom: 44px; font-style: italic; }
  .dots { display: flex; justify-content: center; gap: 10px; margin-bottom: 24px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .quote-source { font-size: 16px; font-weight: 700; letter-spacing: 0.16em; color: #cc7a9a; text-transform: uppercase; }
  .page-num { position: absolute; bottom: 48px; right: 80px; font-size: 13px; color: #ccc; font-weight: 500; }
</style>
</head>
<body>
<div class="shape-1"></div>
<div class="shape-2"></div>
<div class="shape-3"></div>
<div class="content">
  <div class="quote-mark">"</div>
  <div class="quote-body">{{QUOTE_BODY}}</div>
  <div class="dots">
    <div class="dot" style="background:#ffd6e0"></div>
    <div class="dot" style="background:#d4f7f2"></div>
    <div class="dot" style="background:#fff3b0"></div>
  </div>
  <div class="quote-source">{{QUOTE_SOURCE}}</div>
</div>
<span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
