<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; background: #fafafa; font-family: 'Poppins', 'PingFang SC', sans-serif; color: #2d2d2d; padding: 72px 120px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .shape-1 { position: absolute; width: 480px; height: 480px; background: #ffd6e0; border-radius: 50%; top: -140px; right: -60px; opacity: 0.62; }
  .shape-2 { position: absolute; width: 300px; height: 300px; background: #d4f7f2; border-radius: 50%; bottom: -60px; left: 500px; opacity: 0.55; }
  .eyebrow { display: inline-block; font-size: 12px; font-weight: 700; letter-spacing: 0.18em; color: #cc7a9a; text-transform: uppercase; background: rgba(255,214,224,0.55); border-radius: 100px; padding: 5px 18px; margin-bottom: 16px; flex-shrink: 0; position: relative; z-index: 2; }
  .title { font-size: 56px; font-weight: 800; line-height: 1.05; letter-spacing: -0.03em; color: #2d2d2d; margin-bottom: 20px; flex-shrink: 0; position: relative; z-index: 2; }
  .code-wrap { flex: 1; min-height: 0; background: #ffffff; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 6px 24px rgba(0,0,0,0.05); position: relative; z-index: 2; }
  .code-header { display: flex; align-items: center; gap: 8px; padding: 14px 20px; border-bottom: 1px solid #f0f0f0; background: #f8f8f8; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot-r { background: #ff5f57; } .dot-y { background: #febc2e; } .dot-g { background: #28c840; }
  .code-lang { margin-left: auto; font-size: 11px; color: #cc7a9a; font-family: 'Courier New', monospace; letter-spacing: 0.10em; font-weight: 700; }
  .code-body { flex: 1; padding: 24px 36px; overflow: hidden; font-family: 'Courier New', monospace; font-size: 18px; line-height: 1.75; color: #333; white-space: pre; border-left: 4px solid #d4f7f2; }
  .page-num { position: absolute; bottom: 48px; right: 80px; font-size: 13px; color: #ccc; font-weight: 500; }
</style>
</head>
<body>
<div class="shape-1"></div>
<div class="shape-2"></div>
<div class="eyebrow">{{EYEBROW}}</div>
<div class="title">{{TITLE}}</div>
<div class="code-wrap">
  <div class="code-header">
    <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
    <span class="code-lang">{{CODE_LABEL}}</span>
  </div>
  <div class="code-body">{{CODE_SNIPPET}}</div>
</div>
<span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
