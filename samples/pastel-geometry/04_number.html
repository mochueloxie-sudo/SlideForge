<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: #fafafa;
    font-family: 'Poppins', 'PingFang SC', sans-serif;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .shape-1 { position: absolute; width: 600px; height: 600px; background: #ffd6e0; border-radius: 50%; top: -200px; right: -100px; opacity: 0.70; }
  .shape-2 { position: absolute; width: 450px; height: 450px; background: #d4f7f2; border-radius: 50%; bottom: -120px; left: -80px; opacity: 0.65; }
  .shape-3 { position: absolute; width: 180px; height: 180px; background: #fff3b0; border-radius: 50%; top: 120px; right: 380px; opacity: 0.60; }
  .center { text-align: center; position: relative; z-index: 2; }
  .number {
    font-size: 200px; font-weight: 800; line-height: 1;
    color: #cc7a9a; letter-spacing: -0.04em; margin-bottom: 8px;
  }
  .unit { font-size: 64px; font-weight: 300; color: #5fbcb0; margin-left: 8px; vertical-align: super; }
  .dots { display: flex; justify-content: center; gap: 10px; margin: 28px 0; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .label { font-size: 28px; font-weight: 400; color: #555; max-width: 580px; line-height: 1.5; }
  .page-num { position: absolute; bottom: 48px; right: 80px; font-size: 13px; color: #ccc; font-weight: 500; }
</style>
</head>
<body>
<div class="shape-1"></div>
<div class="shape-2"></div>
<div class="shape-3"></div>
<div class="center">
  <div class="number">{{BIG_NUMBER}}<span class="unit">{{NUMBER_UNIT}}</span></div>
  <div class="dots">
    <div class="dot" style="background:#ffd6e0"></div>
    <div class="dot" style="background:#d4f7f2"></div>
    <div class="dot" style="background:#fff3b0"></div>
  </div>
  <div class="label">{{TITLE}}</div>
</div>
<span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
