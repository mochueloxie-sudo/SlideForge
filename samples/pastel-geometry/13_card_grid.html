<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; background: #fafafa; font-family: 'Poppins', 'PingFang SC', sans-serif; color: #2d2d2d; padding: 64px 120px 72px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .shape-1 { position: absolute; width: 460px; height: 460px; background: #ffd6e0; border-radius: 50%; top: -130px; right: -50px; opacity: 0.60; }
  .shape-2 { position: absolute; width: 300px; height: 300px; background: #d4f7f2; border-radius: 50%; bottom: -60px; left: 350px; opacity: 0.55; }
  .eyebrow { display: inline-block; font-size: 12px; font-weight: 700; letter-spacing: 0.18em; color: #cc7a9a; text-transform: uppercase; background: rgba(255,214,224,0.55); border-radius: 100px; padding: 5px 18px; margin-bottom: 16px; flex-shrink: 0; position: relative; z-index: 2; }
  .title { font-size: 52px; font-weight: 800; line-height: 1.05; letter-spacing: -0.03em; color: #2d2d2d; margin-bottom: 24px; flex-shrink: 0; position: relative; z-index: 2; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; flex: 1; position: relative; z-index: 2; }
  .card { background: #ffffff; border-radius: 16px; padding: 30px 28px; display: flex; flex-direction: column; box-shadow: 0 4px 16px rgba(0,0,0,0.05); }
  .card:nth-child(1) { border-top: 4px solid #ffd6e0; }
  .card:nth-child(2) { border-top: 4px solid #d4f7f2; }
  .card:nth-child(3) { border-top: 4px solid #fff3b0; }
  .card-icon { font-size: 28px; margin-bottom: 14px; }
  .card-title { font-size: 20px; font-weight: 700; color: #2d2d2d; margin-bottom: 10px; line-height: 1.3; }
  .card-body { font-size: 15px; color: #888; line-height: 1.65; flex: 1; font-weight: 400; }
  .card-tag { display: inline-block; margin-top: 14px; font-size: 11px; font-weight: 700; letter-spacing: 0.10em; color: #cc7a9a; background: rgba(255,214,224,0.3); border-radius: 100px; padding: 3px 10px; text-transform: uppercase; }
  .page-num { position: absolute; bottom: 44px; right: 80px; font-size: 13px; color: #ccc; font-weight: 500; }

  /* card-label: small category text above card title */
  .card-label {
    font-size: 12px; font-weight: 600; letter-spacing: 0.16em;
    text-transform: uppercase; opacity: 0.55; margin-bottom: 10px;
  }
  /* layout-2x2: 2-column card grid */
  body.layout-2x2 .grid {
    grid-template-columns: 1fr 1fr !important;
    max-width: 1520px !important;
    gap: 28px !important;
  }
  body.layout-2x2 .card  { padding: 44px 40px !important; }
  body.layout-2x2 .card-icon  { font-size: 44px !important; }
  body.layout-2x2 .card-title { font-size: 28px !important; }
  body.layout-2x2 .card-body  { font-size: 19px !important; }
  body.layout-2x2 .card-label { font-size: 13px !important; }
</style>
</head>
<body>
<div class="shape-1"></div>
<div class="shape-2"></div>
<div class="eyebrow">{{EYEBROW}}</div>
<h1 class="title">{{TITLE}}</h1>
<div class="grid">{{CARDS_HTML}}</div>
<span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
