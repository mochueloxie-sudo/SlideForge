<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; background: linear-gradient(90deg, #ffd6ec 50%, #d6f4ff 50%); font-family: 'Nunito', 'PingFang SC', sans-serif; color: #1a1a1a; padding: 72px 120px 90px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .blob-tr { position: absolute; width: 340px; height: 340px; background: #ffb3c1; border-radius: 50%; top: -90px; right: 600px; opacity: 0.22; }
  .eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 0.18em; color: #cc6b8e; text-transform: uppercase; margin-bottom: 10px; flex-shrink: 0; position: relative; z-index: 2; }
  .title { font-size: 56px; font-weight: 800; line-height: 1.05; letter-spacing: -0.03em; color: #1a1a1a; margin-bottom: 28px; flex-shrink: 0; position: relative; z-index: 2; }
  .table-wrap { flex: 1; min-height: 0; background: #ffffff; border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(255,179,193,0.14), 0 2px 8px rgba(0,0,0,0.05); position: relative; z-index: 2; }
  table { width: 100%; border-collapse: collapse; flex: 1; display: flex; flex-direction: column; }
  thead { flex-shrink: 0; }
  thead tr { background: linear-gradient(90deg, #ffd6ec, #d6f4ff); display: flex; }
  thead th { flex: 1; padding: 0 28px; height: {{TABLE_HEADER_HEIGHT}}px; display: flex; align-items: center; font-size: {{TABLE_TH_FONT}}px; font-weight: 700; color: #cc6b8e; letter-spacing: 0.08em; border-bottom: 2px solid rgba(255,179,193,0.3); text-transform: uppercase; font-size: 12px; }
  tbody { flex: 1; display: flex; flex-direction: column; }
  tbody tr { flex: 1; display: flex; }
  tbody tr:nth-child(odd)  { background: #ffffff; }
  tbody tr:nth-child(even) { background: #fdf8fb; }
  tbody td { flex: 1; padding: 0 28px; font-size: {{TABLE_FONT_SIZE}}px; color: #333; border-bottom: 1px solid #f0e8ed; display: flex; align-items: center; }
  tbody tr:last-child td { border-bottom: none; }
  .page-num { position: absolute; bottom: 48px; right: 80px; font-size: 13px; color: #bbb; font-weight: 600; }
</style>
</head>
<body>
<div class="blob-tr"></div>
<div class="eyebrow">{{EYEBROW}}</div>
<h1 class="title">{{TITLE}}</h1>
<div class="table-wrap">
  <table>
    <thead><tr>{{TABLE_HEADERS}}</tr></thead>
    <tbody>{{TABLE_ROWS}}</tbody>
  </table>
</div>
<span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
