<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; background: linear-gradient(90deg, #ffd6ec 50%, #d6f4ff 50%); font-family: 'Nunito', 'PingFang SC', sans-serif; color: #1a1a1a; padding: 64px 120px 80px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .blob { position: absolute; width: 300px; height: 300px; background: #87ceeb; border-radius: 50%; top: -80px; right: 500px; opacity: 0.22; }
  .eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 0.18em; color: #cc6b8e; text-transform: uppercase; margin-bottom: 10px; flex-shrink: 0; position: relative; z-index: 2; }
  .title { font-size: 52px; font-weight: 800; line-height: 1.05; letter-spacing: -0.03em; color: #1a1a1a; margin-bottom: 24px; flex-shrink: 0; position: relative; z-index: 2; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; flex: 1; position: relative; z-index: 2; }
  .card { background: #ffffff; border-radius: 16px; padding: 30px 28px; display: flex; flex-direction: column; box-shadow: 0 4px 16px rgba(255,179,193,0.12), 0 1px 4px rgba(0,0,0,0.04); }
  .card:nth-child(1) { border-top: 4px solid #ffb3c1; }
  .card:nth-child(2) { border-top: 4px solid #87ceeb; }
  .card:nth-child(3) { border-top: 4px solid #ffb3c1; }
  .card-icon { font-size: 28px; margin-bottom: 14px; }
  .card-title { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 10px; line-height: 1.3; }
  .card-body { font-size: 15px; color: #888; line-height: 1.65; flex: 1; font-weight: 400; }
  .card-tag { display: inline-block; margin-top: 14px; font-size: 11px; font-weight: 700; letter-spacing: 0.10em; color: #cc6b8e; background: rgba(255,179,193,0.15); border-radius: 100px; padding: 3px 10px; text-transform: uppercase; }
  .page-num { position: absolute; bottom: 44px; right: 80px; font-size: 13px; color: #bbb; font-weight: 600; }

  /* card-label: small category text above card title */
  .card-label {
    font-size: 12px; font-weight: 600; letter-spacing: 0.16em;
    text-transform: uppercase; opacity: 0.55; margin-bottom: 10px;
  }
  /* layout-2x2: 2-column card grid */
  body.layout-2x2 .grid {
    grid-template-columns: 1fr 1fr !important;
    max-width: 1520px !important;
    gap: 28px !important;
  }
  body.layout-2x2 .card  { padding: 44px 40px !important; }
  body.layout-2x2 .card-icon  { font-size: 44px !important; }
  body.layout-2x2 .card-title { font-size: 28px !important; }
  body.layout-2x2 .card-body  { font-size: 19px !important; }
  body.layout-2x2 .card-label { font-size: 13px !important; }
</style>
</head>
<body>
<div class="blob"></div>
<div class="eyebrow">{{EYEBROW}}</div>
<h1 class="title">{{TITLE}}</h1>
<div class="grid">{{CARDS_HTML}}</div>
<span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
