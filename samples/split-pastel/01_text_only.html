<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: linear-gradient(90deg, #ffd6ec 50%, #d6f4ff 50%);
    font-family: 'Nunito', 'PingFang SC', sans-serif;
    color: #1a1a1a;
    padding: 80px 120px;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; justify-content: flex-start;
  }
  .blob-tl {
    position: absolute; width: 380px; height: 380px;
    background: #ffb3c1; border-radius: 50%;
    top: -120px; left: -80px; opacity: 0.30;
  }
  .blob-br {
    position: absolute; width: 320px; height: 320px;
    background: #87ceeb; border-radius: 50%;
    bottom: -80px; right: -60px; opacity: 0.30;
  }
  .eyebrow {
    font-size: 13px; font-weight: 700; letter-spacing: 0.18em;
    color: #cc6b8e; text-transform: uppercase;
    margin-bottom: 16px; position: relative; z-index: 2;
  }
  .accent-line { width: 56px; height: 4px; background: linear-gradient(90deg,#ffb3c1,#87ceeb); border-radius: 2px; margin-bottom: 32px; }
  .title {
    font-size: 72px; font-weight: 800; line-height: 1.05;
    letter-spacing: -0.03em; color: #1a1a1a;
    margin-bottom: 48px; max-width: 1100px;
    position: relative; z-index: 2;
  }
  .body-text {
    font-size: 23px; font-weight: 400; line-height: 1.75;
    color: #3a3a3a; max-width: 980px; margin-bottom: 24px;
    position: relative; z-index: 2;
  }
  .secondary {
    font-size: 21px; font-weight: 300; line-height: 1.7;
    color: #777; max-width: 860px;
    position: relative; z-index: 2;
  }
  .page-num {
    position: absolute; bottom: 48px; right: 80px;
    font-size: 13px; color: #bbb; font-weight: 600;
  }
</style>
</head>
<body>
<div class="blob-tl"></div>
<div class="blob-br"></div>
<div class="eyebrow">{{EYEBROW}}</div>
<div class="accent-line"></div>
<h1 class="title">{{TITLE}}</h1>
<p class="body-text">{{BODY}}</p>
<p class="secondary">{{SECONDARY}}</p>
<span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
