<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: linear-gradient(90deg, #ffd6ec 50%, #d6f4ff 50%);
    font-family: 'Nunito', 'PingFang SC', sans-serif;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .blob-1 { position: absolute; width: 440px; height: 440px; background: #ffb3c1; border-radius: 50%; top: -120px; left: -80px; opacity: 0.30; }
  .blob-2 { position: absolute; width: 360px; height: 360px; background: #87ceeb; border-radius: 50%; bottom: -80px; right: -60px; opacity: 0.30; }
  .card {
    position: relative; z-index: 2;
    background: #ffffff; border-radius: 32px;
    padding: 80px 120px; text-align: center;
    box-shadow: 0 24px 80px rgba(0,0,0,0.09), 0 4px 16px rgba(0,0,0,0.05);
    min-width: 700px;
  }
  .number {
    font-size: 180px; font-weight: 800; line-height: 1;
    color: #ffb3c1; margin-bottom: 16px; letter-spacing: -0.04em;
  }
  .unit { font-size: 56px; font-weight: 400; color: #87ceeb; margin-left: 8px; vertical-align: super; }
  .divider { width: 60px; height: 4px; background: linear-gradient(90deg,#ffb3c1,#87ceeb); border-radius: 2px; margin: 24px auto; }
  .label { font-size: 26px; font-weight: 400; color: #666; max-width: 560px; line-height: 1.5; }
  .page-num { position: absolute; bottom: 44px; right: 80px; font-size: 13px; color: #bbb; font-weight: 600; }
</style>
</head>
<body>
<div class="blob-1"></div>
<div class="blob-2"></div>
<div class="card">
  <div class="number">{{BIG_NUMBER}}<span class="unit">{{NUMBER_UNIT}}</span></div>
  <div class="divider"></div>
  <div class="label">{{TITLE}}</div>
</div>
<span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
