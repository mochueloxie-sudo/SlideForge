<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; background: linear-gradient(90deg, #ffd6ec 50%, #d6f4ff 50%); font-family: 'Nunito', 'PingFang SC', sans-serif; color: #1a1a1a; padding: 80px 120px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .blob { position: absolute; width: 380px; height: 380px; background: #ffb3c1; border-radius: 50%; top: -100px; right: 620px; opacity: 0.22; }
  .eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 0.18em; color: #cc6b8e; text-transform: uppercase; margin-bottom: 20px; flex-shrink: 0; position: relative; z-index: 2; }
  .panel { background: #ffffff; border-radius: 20px; border-top: 4px solid #ffb3c1; padding: 44px 56px; flex: 1; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 8px 32px rgba(255,179,193,0.14); position: relative; z-index: 2; }
  .panel-body { font-size: 24px; font-weight: 400; line-height: 1.75; color: #333; }
  .page-num { position: absolute; bottom: 44px; right: 80px; font-size: 13px; color: #bbb; font-weight: 600; }
  {{PANEL_CSS}}
</style>
</head>
<body>
<div class="blob"></div>
<div class="eyebrow">{{EYEBROW}}</div>
<div class="panel">
  <div class="panel-body">{{PANEL_BODY}}</div>
</div>
<span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
