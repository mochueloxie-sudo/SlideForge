<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{QUOTE_SOURCE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: linear-gradient(90deg, #ffd6ec 50%, #d6f4ff 50%);
    font-family: 'Nunito', 'PingFang SC', sans-serif;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .blob-1 { position: absolute; width: 500px; height: 500px; background: #ffb3c1; border-radius: 50%; top: -150px; left: -100px; opacity: 0.28; }
  .blob-2 { position: absolute; width: 400px; height: 400px; background: #87ceeb; border-radius: 50%; bottom: -100px; right: -80px; opacity: 0.28; }
  .card {
    position: relative; z-index: 2;
    background: #ffffff; border-radius: 32px;
    padding: 80px 100px; max-width: 1400px;
    box-shadow: 0 20px 70px rgba(0,0,0,0.09);
  }
  .quote-mark { font-size: 160px; line-height: 0.8; color: #ffb3c1; font-weight: 800; margin-bottom: 8px; }
  .quote-body { font-size: 40px; font-weight: 600; line-height: 1.55; color: #1a1a1a; margin-bottom: 44px; font-style: italic; }
  .divider { width: 60px; height: 4px; background: linear-gradient(90deg,#ffb3c1,#87ceeb); border-radius: 2px; margin-bottom: 24px; }
  .quote-source { font-size: 17px; font-weight: 700; letter-spacing: 0.12em; color: #cc6b8e; text-transform: uppercase; }
  .page-num { position: absolute; bottom: 44px; right: 80px; font-size: 13px; color: #bbb; font-weight: 600; }
</style>
</head>
<body>
<div class="blob-1"></div>
<div class="blob-2"></div>
<div class="card">
  <div class="quote-mark">"</div>
  <div class="quote-body">{{QUOTE_BODY}}</div>
  <div class="divider"></div>
  <div class="quote-source">{{QUOTE_SOURCE}}</div>
</div>
<span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
