<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Terminal Green — Content</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { width: 1920px; height: 1080px; overflow: hidden; }

  body {
    width: 1920px; height: 1080px;
    background: #0d1117;
    font-family: 'JetBrains Mono', monospace;
    color: #c9d1d9;
    padding: 80px 120px;
    position: relative;
  }
  .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; color: #39d353; text-transform: uppercase; margin-bottom: 20px; }
  .title { font-size: 52px; font-weight: 700; line-height: 1.1; color: #c9d1d9; margin-bottom: 48px; max-width: 800px; }
  .panel {
    background: rgba(22,27,34,0.88);
    border: 1px solid rgba(57,211,83,0.25);
    border-top: 1px solid rgba(88,166,255,0.12);
    border-bottom: 1px solid rgba(0,0,0,0.40);
    border-radius: 10px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.50), 0 4px 12px rgba(57,211,83,0.10), inset 0 1px 0 rgba(88,166,255,0.08);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    padding: 48px 56px; max-width: 760px;
  }
  .panel-body { font-size: 16px; line-height: 1.7; color: rgba(201,209,217,0.7); }
  .page-num { position: absolute; bottom: 56px; right: 120px; font-size: 12px; color: #30363d; }
  {{PANEL_CSS}}
</style>
</head>
<body>
  <div class="eyebrow">{{EYEBROW}}</div>
  <h1 class="title">Terminal Green<br>Panel 精修版</h1>
  <div class="panel">
    <div class="panel-body">{{PANEL_BODY}}</div>
  </div>
  <div class="page-num">{{PAGE_NUM}} / {{TOTAL}}</div>
</body>
</html>
