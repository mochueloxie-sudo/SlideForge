<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Dark Botanical — Sample</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { width: 1920px; height: 1080px; overflow: hidden; }

  body {
    width: 1920px; height: 1080px;
    background: radial-gradient(circle at 20% 15%, rgba(180,130,80,0.12) 0%, rgba(20,18,14,0) 28%), linear-gradient(180deg, #191916 0%, #1e1c17 55%, #141310 100%);
    font-family: 'Space Grotesk', 'PingFang SC', sans-serif;
    color: #f5f0e8;
    padding-top: 0;
    position: relative;
    display: flex; flex-direction: column;
  }
  /* Top bar */
  .topbar {
    background: rgba(25,25,22,0.88);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(212,165,116,0.15);
    border-top: 1px solid rgba(200,220,255,0.06);
    padding: 0 60px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .logo { font-size: 18px; font-weight: 700; color: #f5f0e8; letter-spacing: -0.02em; }
  .logo span { color: #e8c9a0; }
  .nav-items { display: flex; gap: 40px; align-items: center; }
  .nav-item { font-size: 15px; color: #8a8070; cursor: pointer; transition: color 0.2s; }
  .nav-item:hover { color: #f5f0e8; }
  .nav-item.active { color: #e8c9a0; font-weight: 500; }
  .nav-item.active::after {
    content: '';
    display: block;
    height: 2px;
    background: #e8c9a0;
    margin-top: 2px;
    border-radius: 1px;
  }
  /* Progress bar */
  .progress-bar {
    height: 3px;
    background: rgba(0,0,0,0.35);
    flex-shrink: 0;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #4361ee, #e8c9a0);
    width: 42%;
    transition: width 0.3s ease;
  }
  /* Page content placeholder */
  .content {
    flex: 1;
    padding: 80px 120px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .section-label { font-size: 13px; color: #e8c9a0; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 20px; }
  .title { font-size: 58px; font-weight: 700; line-height: 1.08; letter-spacing: -0.03em; color: #f5f0e8; margin-bottom: 24px; }
  .body { font-size: 22px; line-height: 1.7; color: #8a8070; max-width: 800px; }
  /* Bottom bar */
  .bottombar {
    padding: 0 60px 28px;
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
  }
  .bottom-text { font-size: 13px; color: rgba(154,167,189,0.5); }
  .page-num { font-size: 13px; color: rgba(154,167,189,0.6); }
</style>
</head>
<body>
  <div class="topbar">
    <div class="logo">{{NAV_LOGO_A}}<span>{{NAV_LOGO_B}}</span></div>
    <div class="nav-items">
{{NAV_ITEMS_HTML}}
    </div>
    <div style="font-size:14px;opacity:0.55">{{AUTHOR_DATE}}</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" style="width:{{PROGRESS_PCT}}%"></div></div>
  <div class="content">
    <div class="section-label">{{SECTION_LABEL}}</div>
    <h1 class="title">{{TITLE}}</h1>
    <p class="body">{{SUBTITLE}}</p>
  </div>
  <div class="bottombar">
    <div class="bottom-text">{{BOTTOM_TEXT}}</div>
    <div class="page-num">{{PAGE_NUM}} / {{TOTAL}}</div>
  </div>
</body>
</html>
