<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { width: 1920px; height: 1080px; overflow: hidden; }

  body {
    width: 1920px; height: 1080px;
    background: radial-gradient(circle at 20% 15%, rgba(100,130,255,0.16) 0%, rgba(14,14,28,0) 28%), linear-gradient(180deg, #0e0e1c 0%, #141428 55%, #0b0b18 100%);
    font-family: 'Space Grotesk', 'PingFang SC', sans-serif;
    color: #f5f7fb;
    padding: 80px 120px;
    position: relative;
    display: flex; flex-direction: column;
  }
  .eyebrow { font-size: 13px; font-weight: 500; letter-spacing: 0.15em; color: #7cc7ff; text-transform: uppercase; margin-bottom: 16px; flex-shrink: 0; }
  .title { font-size: 52px; font-weight: 700; line-height: 1.08; letter-spacing: -0.03em; color: #f5f7fb; margin-bottom: 36px; flex-shrink: 0; }
  .code-wrap {
    flex: 1; min-height: 0;
    background: rgba(71,113,255,0.10);
    border: 1px solid rgba(71,113,255,0.22);
    border-radius: 16px; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .code-header {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 20px; border-bottom: 1px solid rgba(71,113,255,0.22);
    background: rgba(0,0,0,0.15);
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }
  .code-lang { margin-left: auto; font-size: 12px; color: #7cc7ff; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.08em; }
  .code-body {
    flex: 1; padding: 28px 32px; overflow: hidden;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 20px; line-height: 1.7; color: #c8d0e8;
    white-space: pre;
  }
  .hairline { position: absolute; bottom: 80px; left: 120px; right: 120px; height: 1px; background: rgba(100,130,255,0.35); }
  .page-num { position: absolute; bottom: 56px; right: 120px; font-size: 13px; color: rgba(154,167,189,0.6); }
</style>
</head>
<body>
  <div class="eyebrow">{{EYEBROW}}</div>
  <h1 class="title">{{TITLE}}</h1>
  <div class="code-wrap">
    <div class="code-header">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
      <span class="code-lang">{{CODE_LABEL}}</span>
    </div>
    <div class="code-body">{{CODE_SNIPPET}}</div>
  </div>
  <div class="hairline"></div>
  <span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
