<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Electric Studio — Sample</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { width: 1920px; height: 1080px; overflow: hidden; }

  body {
    width: 1920px; height: 1080px;
    background: radial-gradient(circle at 20% 15%, rgba(100,130,255,0.16) 0%, rgba(14,14,28,0) 28%), linear-gradient(180deg, #0e0e1c 0%, #141428 55%, #0b0b18 100%);
    font-family: 'Space Grotesk', 'PingFang SC', sans-serif;
    color: #f5f7fb;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .glow {
    position: absolute; width: 680px; height: 680px;
    top: -160px; right: -120px;
    background: radial-gradient(circle, rgba(93,139,255,0.12) 0%, transparent 70%);
  }
  .center {
    text-align: center; position: relative; z-index: 2;
  }
  .number {
    font-size: 180px; font-weight: 700; line-height: 1;
    letter-spacing: -0.04em; color: #7cc7ff;
    font-family: 'Space Grotesk', sans-serif;
    margin-bottom: 32px;
    text-shadow: 0 0 80px rgba(93,139,255,0.3);
  }
  .unit {
    font-size: 48px; font-weight: 300; color: #8890a8;
    margin-left: 8px; vertical-align: super;
  }
  .label {
    font-size: 22px; font-weight: 400; line-height: 1.5;
    color: #8890a8; max-width: 600px; margin: 0 auto;
  }
  .hairline {
    position: absolute; bottom: 80px; left: 120px; right: 120px;
    height: 1px; background: rgba(100,130,255,0.35);
  }
  .page-num { position: absolute; bottom: 56px; right: 120px; font-size: 13px; color: rgba(154,167,189,0.6); }

  /* ── layout hints ─────────────────────────────────────────────────────── */
  /* split: 数字居左，标签/说明居右 */
  body.layout-split { padding: 0 120px; }
  body.layout-split .center {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 80px; align-items: center; text-align: left; width: 100%;
  }
  body.layout-split .number { font-size: 220px; line-height: 0.9; }
  body.layout-split .label  { font-size: 32px; max-width: 480px; line-height: 1.5; }
  </style>
</head>
<body>
<div class="glow"></div>
<div class="center">
  <div class="number">{{BIG_NUMBER}}<span class="unit">{{NUMBER_UNIT}}</span></div>
  <div class="label">{{TITLE}}</div>
</div>
<div class="hairline"></div>
<span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
