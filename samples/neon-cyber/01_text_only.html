<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { width: 1920px; height: 1080px; overflow: hidden; }

  body {
    width: 1920px; height: 1080px;
    background: radial-gradient(circle at 20% 15%, rgba(0,245,212,0.10) 0%, rgba(0,0,0,0) 28%),
                linear-gradient(180deg, #0f0f14 0%, #14141f 55%, #0a0a10 100%);
    font-family: 'Space Grotesk', 'PingFang SC', sans-serif;
    color: #f0f0f8;
    padding: 80px 120px;
    position: relative;
    display: flex; flex-direction: column; justify-content: flex-start;
  }
  .section-num {
    font-size: 13px; font-weight: 500; letter-spacing: 0.15em;
    color: #00f5d4; text-transform: uppercase; margin-bottom: 20px;
  }
  .title {
    font-size: 58px; font-weight: 700; line-height: 1.08;
    letter-spacing: -0.03em; color: #f0f0f8;
    margin-bottom: 48px; max-width: 900px;
  }
  .body-text {
    font-size: 22px; font-weight: 400; line-height: 1.7;
    color: #9898b0; max-width: 860px; margin-bottom: 28px;
  }
  .secondary {
    font-size: 22px; line-height: 1.7;
    color: #686880; max-width: 860px;
  }
  .hairline {
    position: absolute; bottom: 80px; left: 120px; right: 120px;
    height: 1px; background: rgba(139,92,246,0.35);
  }
  .page-num {
    position: absolute; bottom: 56px; right: 120px;
    font-size: 13px; color: rgba(154,167,189,0.6);
  }
</style>
</head>
<body>
  <div class="section-num">{{EYEBROW}}</div>
  <h1 class="title">{{TITLE}}</h1>
  <p class="body-text">{{BODY}}</p>
  <p class="secondary">{{SECONDARY}}</p>
  <div class="hairline"></div>
  <span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
