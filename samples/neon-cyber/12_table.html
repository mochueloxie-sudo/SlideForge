<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { width: 1920px; height: 1080px; overflow: hidden; }

  body {
    width: 1920px; height: 1080px;
    background: radial-gradient(circle at 20% 15%, rgba(0,245,212,0.10) 0%, rgba(10,10,18,0) 28%), linear-gradient(180deg, #0f0f14 0%, #14141f 55%, #0a0a10 100%);
    font-family: 'Space Grotesk', 'PingFang SC', sans-serif;
    color: #f0f0f8;
    padding: 72px 120px 100px;
    position: relative;
    display: flex; flex-direction: column;
  }
  .eyebrow { font-size: 13px; font-weight: 500; letter-spacing: 0.15em; color: #00f5d4; text-transform: uppercase; margin-bottom: 16px; flex-shrink: 0; }
  .title { font-size: 52px; font-weight: 700; line-height: 1.08; letter-spacing: -0.03em; color: #f0f0f8; margin-bottom: 44px; flex-shrink: 0; }
  .table-wrap {
    flex: 1; min-height: 0;
    border-radius: 20px;
    border: 1px solid rgba(139,92,246,0.18);
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  table { width: 100%; border-collapse: collapse; flex: 1; display: flex; flex-direction: column; }
  thead { flex-shrink: 0; }
  thead tr { background: rgba(139,92,246,0.22); display: flex; }
  thead th {
    flex: 1; padding: 0 32px;
    height: {{TABLE_HEADER_HEIGHT}}px;
    display: flex; align-items: center;
    font-size: {{TABLE_TH_FONT}}px; font-weight: 600;
    color: #00f5d4; letter-spacing: 0.06em;
    border-bottom: 1px solid rgba(139,92,246,0.18);
  }
  tbody { flex: 1; display: flex; flex-direction: column; }
  tbody tr { flex: 1; display: flex; }
  tbody tr:nth-child(odd)  { background: rgba(15,15,22,0.70); }
  tbody tr:nth-child(even) { background: rgba(25,22,35,0.50); }
  tbody td {
    flex: 1; padding: 0 32px;
    font-size: {{TABLE_FONT_SIZE}}px; color: #b0b0c8;
    border-bottom: 1px solid rgba(139,92,246,0.18);
    display: flex; align-items: center;
  }
  tbody tr:last-child td { border-bottom: none; }
  .hairline { position: absolute; bottom: 80px; left: 120px; right: 120px; height: 1px; background: rgba(139,92,246,0.35); }
  .page-num { position: absolute; bottom: 56px; right: 120px; font-size: 13px; color: rgba(154,167,189,0.6); }
</style>
</head>
<body>
  <div class="eyebrow">{{EYEBROW}}</div>
  <h1 class="title">{{TITLE}}</h1>
  <div class="table-wrap">
    <table>
      <thead><tr>{{TABLE_HEADERS}}</tr></thead>
      <tbody>{{TABLE_ROWS}}</tbody>
    </table>
  </div>
  <div class="hairline"></div>
  <span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
