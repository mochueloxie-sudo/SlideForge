<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Neon Cyber — Sample</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { width: 1920px; height: 1080px; overflow: hidden; }

  body {
    width: 1920px; height: 1080px;
    background: radial-gradient(circle at 20% 15%, rgba(0,245,212,0.10) 0%, rgba(10,10,18,0) 28%), linear-gradient(180deg, #0f0f14 0%, #14141f 55%, #0a0a10 100%);
    font-family: 'Space Grotesk', 'PingFang SC', sans-serif;
    color: #f0f0f8;
    padding: 80px 120px;
    position: relative;
  }
  .title {
    font-size: 58px; font-weight: 700; line-height: 1.08;
    letter-spacing: -0.03em; color: #f0f0f8; margin-bottom: 60px;
  }
  /* Hairline examples */
  .hairline { height: 1px; background: rgba(139,92,246,0.35); margin: 40px 0; }
  .hairline-thin { height: 1px; background: rgba(139,92,246,0.35); margin: 40px 0; }
  .hairline-accent { height: 1px; background: rgba(139,92,246,0.35); margin: 40px 0; }
  .label-row {
    display: flex; align-items: center; gap: 20px; margin: 20px 0;
  }
  .label-text { font-size: 14px; color: #686880; white-space: nowrap; }
  .label-val { font-size: 14px; color: #00f5d4; font-family: 'JetBrains Mono', monospace; }
  .hairline-section { margin-bottom: 60px; }
  .section-label {
    font-size: 13px; color: #00f5d4; letter-spacing: 0.1em;
    text-transform: uppercase; margin-bottom: 16px;
  }
  .page-num { position: absolute; bottom: 56px; right: 120px; font-size: 13px; color: rgba(154,167,189,0.6); }
</style>
</head>
<body>
  <div class="title">Hairline 分隔线系统</div>

  <div class="hairline-section">
    <div class="section-label">标准 Hairline — rgba(139,92,246,0.35)</div>
    <div class="hairline"></div>
    <div class="label-row">
      <span class="label-text">用途：页面主分隔、内容分组</span>
      <span class="label-val">border: 1px solid rgba(139,92,246,0.35)</span>
    </div>
  </div>

  <div class="hairline-section">
    <div class="section-label">细 Hairline — rgba(139,92,246,0.35)</div>
    <div class="hairline-thin"></div>
    <div class="label-row">
      <span class="label-text">用途：信息层级弱分隔</span>
      <span class="label-val">opacity: 0.15</span>
    </div>
  </div>

  <div class="hairline-section">
    <div class="section-label">强调 Hairline — rgba(124,199,255,0.80)</div>
    <div class="hairline-accent"></div>
    <div class="label-row">
      <span class="label-text">用途：重点区域边框</span>
      <span class="label-val">opacity: 0.80</span>
    </div>
  </div>

  <span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
