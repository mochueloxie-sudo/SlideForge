<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Neon Cyber — Content</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { width: 1920px; height: 1080px; overflow: hidden; }

  body {
    width: 1920px; height: 1080px;
    background: #0a0a0a;
    font-family: 'JetBrains Mono', monospace;
    color: #ffffff;
    padding: 80px 120px;
    position: relative;
  }
  .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.3em; color: #8b5cf6; text-transform: uppercase; margin-bottom: 20px; }
  .title { font-family: 'Orbitron', sans-serif; font-size: 52px; font-weight: 700; line-height: 1.05; color: #ffffff; margin-bottom: 48px; max-width: 800px; text-shadow: 0 0 30px rgba(139,92,246,0.4); }
  .panel {
    background: rgba(15,15,20,0.85);
    border: 1px solid rgba(139,92,246,0.30);
    border-top: 1px solid rgba(0,245,212,0.12);
    border-bottom: 1px solid rgba(0,0,0,0.35);
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.50), 0 4px 12px rgba(139,92,246,0.20), 0 0 30px rgba(0,245,212,0.05), inset 0 1px 0 rgba(0,245,212,0.10);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    padding: 48px 56px; max-width: 760px;
  }
  .panel-body { font-size: 17px; line-height: 1.7; color: rgba(255,255,255,0.7); }
  .page-num { position: absolute; bottom: 56px; right: 120px; font-size: 12px; color: rgba(255,255,255,0.25); }
  {{PANEL_CSS}}
</style>
</head>
<body>
  <div class="eyebrow">{{EYEBROW}}</div>
  <h1 class="title">Neon Cyber<br>Panel 精修版</h1>
  <div class="panel">
    <div class="panel-body">{{PANEL_BODY}}</div>
  </div>
  <div class="page-num">{{PAGE_NUM}} / {{TOTAL}}</div>
</body>
</html>
