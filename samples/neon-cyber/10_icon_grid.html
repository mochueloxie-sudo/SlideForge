<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { width: 1920px; height: 1080px; overflow: hidden; }

  body {
    width: 1920px; height: 1080px;
    background: radial-gradient(circle at 20% 15%, rgba(0,245,212,0.10) 0%, rgba(10,10,18,0) 28%), linear-gradient(180deg, #0f0f14 0%, #14141f 55%, #0a0a10 100%);
    font-family: 'Space Grotesk', 'PingFang SC', sans-serif;
    color: #f0f0f8;
    padding: 72px 120px 100px;
    position: relative;
    display: flex; flex-direction: column;
  }
  .eyebrow { font-size: 13px; font-weight: 500; letter-spacing: 0.15em; color: #00f5d4; text-transform: uppercase; margin-bottom: 16px; flex-shrink: 0; }
  .title { font-size: 52px; font-weight: 700; line-height: 1.08; letter-spacing: -0.03em; color: #f0f0f8; margin-bottom: 44px; flex-shrink: 0; }
  .grid {
    flex: 1; min-height: 0;
    display: grid;
    align-content: center;
    grid-template-columns: repeat({{ICON_GRID_COLS}}, 1fr);
    max-width: {{ICON_GRID_MAX_WIDTH}}px;
    width: 100%;
    margin: 0 auto;
    align-self: center;
    gap: 20px;
  }
  .icon-card {
    min-height: {{ICON_CARD_MIN_HEIGHT}}px;
    padding: 32px 20px;
    background: rgba(15,15,20,0.75);
    border: 1px solid rgba(139,92,246,0.20);
    border-top: 1px solid rgba(255,255,255,0.20);
    border-bottom: 1px solid rgba(0,0,0,0.35);
    border-radius: 20px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    backdrop-filter: blur(22px) saturate(175%); -webkit-backdrop-filter: blur(22px) saturate(175%);
    box-shadow: 0 20px 56px rgba(0,0,0,0.55), 0 6px 16px rgba(139,92,246,0.12), inset 0 1px 0 rgba(255,255,255,0.16);
  }
  .icon-emoji { font-size: {{ICON_EMOJI_SIZE}}px; line-height: 1; }
  .icon-label { font-size: {{ICON_LABEL_SIZE}}px; font-weight: 500; color: #b0b0c8; text-align: center; line-height: 1.4; padding: 0 12px; }
  .hairline { position: absolute; bottom: 80px; left: 120px; right: 120px; height: 1px; background: rgba(139,92,246,0.35); }
  .page-num { position: absolute; bottom: 56px; right: 120px; font-size: 13px; color: rgba(154,167,189,0.6); }
  .icon-desc {
    font-size: 17px; line-height: 1.55;
    color: rgba(104,104,128,0.75);
    text-align: center;
    padding: 0 8px;
    margin-top: 2px;
  }
</style>
</head>
<body>
  <div class="eyebrow">{{EYEBROW}}</div>
  <h1 class="title">{{TITLE}}</h1>
  <div class="grid">{{ICONS_HTML}}</div>
  <div class="hairline"></div>
  <span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
