<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Creative Voltage — Sample</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { width: 1920px; height: 1080px; overflow: hidden; }

  body {
    width: 1920px; height: 1080px;
    background: radial-gradient(circle at 20% 15%, rgba(0,140,255,0.14) 0%, rgba(16,16,36,0) 28%), linear-gradient(135deg, #1a1a2e 0%, #16162a 50%, #0f0f1e 100%);
    font-family: 'Space Grotesk', 'PingFang SC', sans-serif;
    color: #e8eaf6;
    padding: 80px 120px;
    position: relative;
  }
  .title {
    font-size: 58px; font-weight: 700; line-height: 1.08;
    letter-spacing: -0.03em; color: #e8eaf6; margin-bottom: 48px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    max-width: 1200px;
  }
  .card {
    background: rgba(26,26,46,0.75);
    border: 1px solid rgba(0,102,255,0.20);
    border-top: 1px solid rgba(255,255,255,0.20);
    border-bottom: 1px solid rgba(0,0,0,0.35);
    border-radius: 24px;
    padding: 40px 36px;
    backdrop-filter: blur(22px) saturate(175%);
    -webkit-backdrop-filter: blur(22px) saturate(175%);
    box-shadow: 0 32px 80px rgba(0,0,0,0.60), 0 8px 20px rgba(0,102,255,0.14), inset 0 1px 0 rgba(255,255,255,0.14), inset 0 -1px 0 rgba(0,0,0,0.22);
    transition: border-color 0.2s;
  }
  .card:hover { border-color: rgba(140,170,255,0.4); }
  .card-icon { font-size: 36px; margin-bottom: 20px; }
  .card-title {
    font-size: 22px; font-weight: 700; color: #e8eaf6;
    margin-bottom: 12px; line-height: 1.3;
  }
  .card-body { font-size: 16px; color: #787a96; line-height: 1.6; }
  .card-tag {
    display: inline-block;
    margin-top: 20px;
    font-size: 12px; letter-spacing: 0.08em;
    color: #4dabf7;
    border: 1px solid rgba(124,199,255,0.3);
    border-radius: 4px;
    padding: 2px 8px;
    text-transform: uppercase;
  }
  .page-num { position: absolute; bottom: 56px; right: 120px; font-size: 13px; color: rgba(154,167,189,0.6); }

  /* card-label: small category text above card title */
  .card-label {
    font-size: 12px; font-weight: 600; letter-spacing: 0.16em;
    text-transform: uppercase; opacity: 0.55; margin-bottom: 10px;
  }
  /* layout-2x2: 2-column card grid */
  body.layout-2x2 .grid {
    grid-template-columns: 1fr 1fr !important;
    max-width: 1520px !important;
    gap: 28px !important;
  }
  body.layout-2x2 .card  { padding: 44px 40px !important; }
  body.layout-2x2 .card-icon  { font-size: 44px !important; }
  body.layout-2x2 .card-title { font-size: 28px !important; }
  body.layout-2x2 .card-body  { font-size: 19px !important; }
  body.layout-2x2 .card-label { font-size: 13px !important; }
</style>
</head>
<body>
  <div class="title">{{TITLE}}</div>
  <div class="grid">{{CARDS_HTML}}</div>
  <span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
