<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Source+Serif+4:wght@300;400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; background: #faf9f7; font-family: 'Source Serif 4', Georgia, serif; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .crimson-bar { width: 100%; height: 5px; background: #c41e3a; flex-shrink: 0; }
  .main { flex: 1; padding: 48px 140px 64px; display: flex; flex-direction: column; }
  .eyebrow { font-size: 12px; letter-spacing: 0.26em; color: #c41e3a; text-transform: uppercase; font-variant: small-caps; margin-bottom: 10px; flex-shrink: 0; }
  .title { font-family: 'Cormorant Garamond', serif; font-size: 60px; font-weight: 300; line-height: 1.1; color: #1a1a1a; margin-bottom: 24px; flex-shrink: 0; font-style: italic; }
  .table-wrap { flex: 1; min-height: 0; border: 1px solid #d8d2c8; overflow: hidden; display: flex; flex-direction: column; }
  table { width: 100%; border-collapse: collapse; flex: 1; display: flex; flex-direction: column; }
  thead { flex-shrink: 0; }
  thead tr { background: #f0ede8; display: flex; }
  thead th { flex: 1; padding: 0 28px; height: {{TABLE_HEADER_HEIGHT}}px; display: flex; align-items: center; font-size: {{TABLE_TH_FONT}}px; font-weight: 600; color: #c41e3a; letter-spacing: 0.10em; border-bottom: 2px solid #c41e3a; text-transform: uppercase; font-size: 12px; font-variant: small-caps; font-family: 'Source Serif 4', serif; }
  tbody { flex: 1; display: flex; flex-direction: column; }
  tbody tr { flex: 1; display: flex; }
  tbody tr:nth-child(odd)  { background: #faf9f7; }
  tbody tr:nth-child(even) { background: #f5f3ef; }
  tbody td { flex: 1; padding: 0 28px; font-size: {{TABLE_FONT_SIZE}}px; color: #3a3530; border-bottom: 1px solid #e0dbd4; display: flex; align-items: center; }
  tbody tr:last-child td { border-bottom: none; }
  .bottom-bar { width: 100%; height: 3px; background: #d8d2c8; flex-shrink: 0; }
  .page-num { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); font-size: 12px; color: #b0aa9e; letter-spacing: 0.12em; }
</style>
</head>
<body>
<div class="crimson-bar"></div>
<div class="main">
  <div class="eyebrow">{{EYEBROW}}</div>
  <h1 class="title">{{TITLE}}</h1>
  <div class="table-wrap">
    <table>
      <thead><tr>{{TABLE_HEADERS}}</tr></thead>
      <tbody>{{TABLE_ROWS}}</tbody>
    </table>
  </div>
</div>
<div class="bottom-bar"></div>
<div class="page-num">{{PAGE_NUM}} / {{TOTAL}}</div>
</body>
</html>
