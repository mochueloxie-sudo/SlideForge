<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: #faf9f7;
    font-family: 'Source Serif 4', Georgia, serif;
    color: #1a1a1a;
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }
  .crimson-bar { width: 100%; height: 5px; background: #c41e3a; flex-shrink: 0; }
  .main {
    flex: 1; padding: 64px 160px 64px 140px;
    display: flex; flex-direction: column; justify-content: flex-start;
  }
  .eyebrow {
    font-size: 12px; letter-spacing: 0.28em;
    color: #c41e3a; text-transform: uppercase;
    font-variant: small-caps; margin-bottom: 12px;
  }
  .rule-thin { width: 80px; height: 1px; background: #d8d2c8; margin-bottom: 36px; }
  .title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 76px; font-weight: 300; line-height: 1.1;
    color: #1a1a1a; margin-bottom: 48px; max-width: 1100px;
    font-style: italic;
  }
  .body-text {
    font-size: 22px; font-weight: 400; line-height: 1.85;
    color: #3a3530; max-width: 1000px; margin-bottom: 24px;
  }
  .secondary {
    font-size: 20px; font-weight: 300; font-style: italic;
    line-height: 1.75; color: #8a837c; max-width: 900px;
  }
  .bottom-rule { height: 1px; background: #d8d2c8; position: absolute; bottom: 60px; left: 140px; right: 80px; }
  .page-num {
    position: absolute; bottom: 36px;
    left: 50%; transform: translateX(-50%);
    font-size: 12px; color: #b0aa9e; letter-spacing: 0.12em;
  }
</style>
</head>
<body>
<div class="crimson-bar"></div>
<div class="main">
  <div class="eyebrow">{{EYEBROW}}</div>
  <div class="rule-thin"></div>
  <h1 class="title">{{TITLE}}</h1>
  <p class="body-text">{{BODY}}</p>
  <p class="secondary">{{SECONDARY}}</p>
</div>
<div class="bottom-rule"></div>
<div class="page-num">{{PAGE_NUM}} / {{TOTAL}}</div>
</body>
</html>
