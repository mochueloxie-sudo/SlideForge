<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: #faf9f7;
    font-family: 'Source Serif 4', Georgia, serif;
    color: #1a1a1a;
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }
  .crimson-bar { width: 100%; height: 5px; background: #c41e3a; flex-shrink: 0; }
  .main { flex: 1; padding: 56px 140px; display: flex; flex-direction: column; }
  .eyebrow { font-size: 12px; letter-spacing: 0.28em; color: #c41e3a; text-transform: uppercase; font-variant: small-caps; margin-bottom: 10px; flex-shrink: 0; }
  .rule-thin { width: 60px; height: 1px; background: #d8d2c8; margin-bottom: 24px; flex-shrink: 0; }
  .title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 64px; font-weight: 300; line-height: 1.1;
    color: #1a1a1a; margin-bottom: 28px; flex-shrink: 0; font-style: italic;
  }
  .panel {
    background: #f0ede8;
    border-left: 3px solid #c41e3a;
    border-top: 1px solid #d8d2c8;
    border-bottom: 1px solid #d8d2c8;
    border-right: 1px solid #d8d2c8;
    padding: 32px 44px;
    flex: 1; display: flex; flex-direction: column;
  }
  .panel-eyebrow { font-size: 11px; letter-spacing: 0.24em; color: #c41e3a; text-transform: uppercase; font-variant: small-caps; margin-bottom: 10px; }
  .panel-eyebrow:empty { display: none; }
  .panel-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; color: #1a1a1a; margin-bottom: 18px; }
  .panel-title:empty { display: none; margin-bottom: 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; flex: 1; }
  .kp-item {
    display: flex; align-items: center; gap: 18px;
    font-size: {{KP_FONT_SIZE}}px; line-height: 1.55; color: #3a3530;
    flex: 1; border-bottom: 1px solid #e0dbd4;
  }
  .kp-item:last-child { border-bottom: none; }
  .kp-arrow { flex-shrink: 0; width: {{KP_DOT_SIZE}}px; height: {{KP_DOT_SIZE}}px; background: #c41e3a; }
  .bottom-rule { height: 1px; background: #d8d2c8; position: absolute; bottom: 52px; left: 140px; right: 80px; }
  .page-num { position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%); font-size: 12px; color: #b0aa9e; letter-spacing: 0.12em; }
</style>
</head>
<body>
<div class="crimson-bar"></div>
<div class="main">
  <div class="eyebrow">{{EYEBROW}}</div>
  <div class="rule-thin"></div>
  <h1 class="title">{{TITLE}}</h1>
  <div class="panel">
    <div class="panel-eyebrow">{{PANEL_EYEBROW}}</div>
    <div class="panel-title">{{PANEL_TITLE}}</div>
    <ul class="kp-list">
      {{KEY_POINTS_HTML}}
    </ul>
  </div>
</div>
<div class="bottom-rule"></div>
<div class="page-num">{{PAGE_NUM}} / {{TOTAL}}</div>
</body>
</html>
