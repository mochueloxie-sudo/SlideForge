<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Source+Serif+4:wght@300;400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; background: #faf9f7; font-family: 'Source Serif 4', Georgia, serif; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .crimson-bar { width: 100%; height: 5px; background: #c41e3a; flex-shrink: 0; }
  .main { flex: 1; padding: 48px 140px 60px; display: flex; flex-direction: column; }
  .eyebrow { font-size: 12px; letter-spacing: 0.26em; color: #c41e3a; text-transform: uppercase; font-variant: small-caps; margin-bottom: 10px; flex-shrink: 0; }
  .title { font-family: 'Cormorant Garamond', serif; font-size: 56px; font-weight: 300; line-height: 1.1; color: #1a1a1a; margin-bottom: 24px; flex-shrink: 0; font-style: italic; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; flex: 1; }
  .card { border: 1px solid #d8d2c8; padding: 26px 24px; display: flex; flex-direction: column; background: transparent; }
  .card-num { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; color: #c41e3a; margin-bottom: 12px; font-style: italic; line-height: 1; }
  .card-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 10px; line-height: 1.3; }
  .rule { width: 20px; height: 1px; background: #c41e3a; margin-bottom: 12px; }
  .card-body { font-size: 15px; color: #6b6460; line-height: 1.7; flex: 1; }
  .card-tag { display: inline-block; margin-top: 14px; font-size: 11px; letter-spacing: 0.12em; color: #c41e3a; text-transform: uppercase; font-variant: small-caps; }
  .bottom-bar { width: 100%; height: 3px; background: #d8d2c8; flex-shrink: 0; }
  .page-num { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); font-size: 12px; color: #b0aa9e; letter-spacing: 0.12em; }

  /* card-label: small category text above card title */
  .card-label {
    font-size: 12px; font-weight: 600; letter-spacing: 0.16em;
    text-transform: uppercase; opacity: 0.55; margin-bottom: 10px;
  }
  /* layout-2x2: 2-column card grid */
  body.layout-2x2 .grid {
    grid-template-columns: 1fr 1fr !important;
    max-width: 1520px !important;
    gap: 28px !important;
  }
  body.layout-2x2 .card  { padding: 44px 40px !important; }
  body.layout-2x2 .card-icon  { font-size: 44px !important; }
  body.layout-2x2 .card-title { font-size: 28px !important; }
  body.layout-2x2 .card-body  { font-size: 19px !important; }
  body.layout-2x2 .card-label { font-size: 13px !important; }
</style>
</head>
<body>
<div class="crimson-bar"></div>
<div class="main">
  <div class="eyebrow">{{EYEBROW}}</div>
  <h1 class="title">{{TITLE}}</h1>
  <div class="grid">{{CARDS_HTML}}</div>
</div>
<div class="bottom-bar"></div>
<div class="page-num">{{PAGE_NUM}} / {{TOTAL}}</div>
</body>
</html>
