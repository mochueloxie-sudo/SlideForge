<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{QUOTE_SOURCE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Source+Serif+4:ital,wght@0,300;0,400;1,300;1,400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: #faf9f7;
    font-family: 'Source Serif 4', Georgia, serif;
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }
  .crimson-bar { width: 100%; height: 5px; background: #c41e3a; flex-shrink: 0; }
  .main { flex: 1; display: flex; align-items: center; padding: 0 180px; }
  .left-bar { width: 3px; height: 300px; background: #c41e3a; flex-shrink: 0; margin-right: 80px; }
  .content { max-width: 1300px; }
  .rule-top { width: 80px; height: 1px; background: #d8d2c8; margin-bottom: 36px; }
  .quote-body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 52px; font-weight: 300; line-height: 1.5;
    color: #1a1a1a; margin-bottom: 44px; font-style: italic;
  }
  .source-row { display: flex; align-items: center; gap: 20px; }
  .em-dash { color: #c41e3a; font-size: 20px; }
  .quote-source { font-family: 'Source Serif 4', serif; font-size: 17px; font-weight: 400; color: #6b6460; font-style: italic; letter-spacing: 0.04em; }
  .rule-bottom { width: 80px; height: 1px; background: #d8d2c8; margin-top: 36px; }
  .bottom-bar { width: 100%; height: 3px; background: #d8d2c8; flex-shrink: 0; }
  .page-num { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); font-size: 12px; color: #b0aa9e; letter-spacing: 0.12em; }
</style>
</head>
<body>
<div class="crimson-bar"></div>
<div class="main">
  <div class="left-bar"></div>
  <div class="content">
    <div class="rule-top"></div>
    <div class="quote-body">{{QUOTE_BODY}}</div>
    <div class="source-row">
      <span class="em-dash">—</span>
      <div class="quote-source">{{QUOTE_SOURCE}}</div>
    </div>
    <div class="rule-bottom"></div>
  </div>
</div>
<div class="bottom-bar"></div>
<div class="page-num">{{PAGE_NUM}} / {{TOTAL}}</div>
</body>
</html>
