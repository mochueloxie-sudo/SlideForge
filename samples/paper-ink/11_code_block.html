<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Source+Serif+4:wght@300;400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; background: #faf9f7; font-family: 'Source Serif 4', Georgia, serif; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .crimson-bar { width: 100%; height: 5px; background: #c41e3a; flex-shrink: 0; }
  .main { flex: 1; padding: 56px 140px; display: flex; flex-direction: column; }
  .eyebrow { font-size: 12px; letter-spacing: 0.26em; color: #c41e3a; text-transform: uppercase; font-variant: small-caps; margin-bottom: 10px; flex-shrink: 0; }
  .title { font-family: 'Cormorant Garamond', serif; font-size: 60px; font-weight: 300; line-height: 1.1; color: #1a1a1a; margin-bottom: 20px; flex-shrink: 0; font-style: italic; }
  .code-wrap { flex: 1; min-height: 0; background: #ece8e0; border: 1px solid #d8d2c8; border-left: 4px solid #c41e3a; overflow: hidden; display: flex; flex-direction: column; }
  .code-header { display: flex; align-items: center; gap: 8px; padding: 12px 18px; border-bottom: 1px solid #d8d2c8; background: #e5e0d8; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot-r { background: #ff5f57; } .dot-y { background: #febc2e; } .dot-g { background: #28c840; }
  .code-lang { margin-left: auto; font-size: 11px; color: #c41e3a; font-family: 'Courier New', monospace; letter-spacing: 0.10em; }
  .code-body { flex: 1; padding: 24px 36px; overflow: hidden; font-family: 'Courier New', monospace; font-size: 17px; line-height: 1.80; color: #2c2c2c; white-space: pre; }
  .bottom-bar { width: 100%; height: 3px; background: #d8d2c8; flex-shrink: 0; }
  .page-num { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); font-size: 12px; color: #b0aa9e; letter-spacing: 0.12em; }
</style>
</head>
<body>
<div class="crimson-bar"></div>
<div class="main">
  <div class="eyebrow">{{EYEBROW}}</div>
  <div class="title">{{TITLE}}</div>
  <div class="code-wrap">
    <div class="code-header">
      <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
      <span class="code-lang">{{CODE_LABEL}}</span>
    </div>
    <div class="code-body">{{CODE_SNIPPET}}</div>
  </div>
</div>
<div class="bottom-bar"></div>
<div class="page-num">{{PAGE_NUM}} / {{TOTAL}}</div>
</body>
</html>
