<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Source+Serif+4:wght@300;400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; background: #faf9f7; font-family: 'Source Serif 4', Georgia, serif; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .crimson-bar { width: 100%; height: 5px; background: #c41e3a; flex-shrink: 0; }
  .main { flex: 1; padding: 56px 140px 64px; display: flex; flex-direction: column; }
  .eyebrow { font-size: 12px; letter-spacing: 0.26em; color: #c41e3a; text-transform: uppercase; font-variant: small-caps; margin-bottom: 16px; flex-shrink: 0; }
  .rule { width: 60px; height: 1px; background: #d8d2c8; margin-bottom: 28px; flex-shrink: 0; }
  .panel { background: #f0ede8; border-left: 3px solid #c41e3a; border-top: 1px solid #d8d2c8; border-right: 1px solid #d8d2c8; border-bottom: 1px solid #d8d2c8; padding: 40px 52px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .panel-body { font-family: 'Source Serif 4', serif; font-size: 23px; font-weight: 400; line-height: 1.85; color: #3a3530; font-style: italic; }
  .bottom-bar { width: 100%; height: 3px; background: #d8d2c8; flex-shrink: 0; }
  .page-num { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); font-size: 12px; color: #b0aa9e; letter-spacing: 0.12em; }
  {{PANEL_CSS}}
</style>
</head>
<body>
<div class="crimson-bar"></div>
<div class="main">
  <div class="eyebrow">{{EYEBROW}}</div>
  <div class="rule"></div>
  <div class="panel">
    <div class="panel-body">{{PANEL_BODY}}</div>
  </div>
</div>
<div class="bottom-bar"></div>
<div class="page-num">{{PAGE_NUM}} / {{TOTAL}}</div>
</body>
</html>
