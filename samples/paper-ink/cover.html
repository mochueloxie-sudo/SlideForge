<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: #faf9f7;
    font-family: 'Source Serif 4', Georgia, serif;
    color: #1a1a1a;
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }
  .crimson-bar { width: 100%; height: 5px; background: #c41e3a; flex-shrink: 0; }
  .left-accent {
    position: absolute; left: 80px; top: 5px; bottom: 5px;
    width: 2px; background: rgba(196,30,58,0.2);
  }
  .main {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px 160px;
  }
  .eyebrow {
    font-family: 'Source Serif 4', serif;
    font-size: 12px; font-weight: 400; letter-spacing: 0.30em;
    color: #c41e3a; text-transform: uppercase;
    font-variant: small-caps; margin-bottom: 20px;
    text-align: center;
  }
  .rule-thin { width: 120px; height: 1px; background: #d8d2c8; margin: 0 auto 44px; }
  .title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 104px; font-weight: 300; line-height: 1.05;
    letter-spacing: -0.01em; color: #1a1a1a;
    text-align: center; max-width: 1200px; margin-bottom: 48px;
    font-style: italic;
  }
  .ornament {
    color: #c41e3a; font-size: 18px; letter-spacing: 0.4em;
    margin-bottom: 44px; opacity: 0.7;
  }
  .subtitle {
    font-family: 'Source Serif 4', serif;
    font-size: 21px; font-weight: 300; line-height: 1.7;
    color: #6b6460; text-align: center; max-width: 720px;
    font-style: italic;
  }
  .bottom-bar { width: 100%; height: 3px; background: #d8d2c8; flex-shrink: 0; }
  .page-num {
    position: absolute; bottom: 16px;
    left: 50%; transform: translateX(-50%);
    font-family: 'Source Serif 4', serif;
    font-size: 12px; color: #b0aa9e; letter-spacing: 0.12em;
  }
</style>
</head>
<body>
<div class="crimson-bar"></div>
<div class="left-accent"></div>
<div class="main">
  <div class="eyebrow">{{EYEBROW}}</div>
  <div class="rule-thin"></div>
  <h1 class="title">{{TITLE}}</h1>
  <div class="ornament">✦ ✦ ✦</div>
  <p class="subtitle">{{SUBTITLE}}</p>
</div>
<div class="bottom-bar"></div>
<div class="page-num">{{PAGE_NUM}} / {{TOTAL}}</div>
</body>
</html>
