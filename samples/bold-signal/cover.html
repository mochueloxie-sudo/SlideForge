<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { width: 1920px; height: 1080px; overflow: hidden; }

  body {
    width: 1920px; height: 1080px;
    background: radial-gradient(ellipse at 60% 50%, rgba(255,87,34,0.22) 0%, rgba(0,0,0,0) 55%),
                radial-gradient(circle at 15% 80%, rgba(255,87,34,0.14) 0%, transparent 40%),
                radial-gradient(circle at 20% 15%, rgba(255,120,60,0.14) 0%, rgba(26,26,26,0) 28%),
                linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
    font-family: 'Space Grotesk', 'PingFang SC', sans-serif;
    color: #ffffff;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .corner-accent {
    position: absolute; top: 0; right: 0;
    width: 480px; height: 480px;
    background: radial-gradient(circle at 100% 0%, rgba(255,87,34,0.22) 0%, transparent 65%);
    pointer-events: none;
  }
  .bottom-line {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent 0%, #ff7043 30%, #FF8A65 60%, transparent 100%);
  }
  .content {
    position: relative; z-index: 2;
    text-align: center; max-width: 1200px; padding: 0 80px;
  }
  .eyebrow {
    display: inline-block;
    font-size: 13px; font-weight: 500; letter-spacing: 0.22em;
    color: #FF8A65; text-transform: uppercase;
    border: 1px solid rgba(255,138,101,0.30);
    border-radius: 100px; padding: 7px 22px; margin-bottom: 40px;
  }
  .title {
    font-size: 96px; font-weight: 700; line-height: 1.0;
    letter-spacing: -0.04em; color: #ffffff; margin-bottom: 36px;
  }
  .accent-bar {
    width: 72px; height: 3px;
    background: linear-gradient(90deg, #ff7043, #FF8A65);
    margin: 0 auto 36px; border-radius: 2px;
  }
  .subtitle {
    font-size: 22px; font-weight: 400; line-height: 1.55;
    color: #aaaaaa; max-width: 680px; margin: 0 auto;
  }
  .page-num {
    position: absolute; bottom: 56px; right: 120px;
    font-size: 13px; color: rgba(154,167,189,0.45);
  }
</style>
</head>
<body>
<div class="corner-accent"></div>
<div class="bottom-line"></div>
<div class="content">
  <div class="eyebrow">{{EYEBROW}}</div>
  <h1 class="title">{{TITLE}}</h1>
  <div class="accent-bar"></div>
  <p class="subtitle">{{SUBTITLE}}</p>
</div>
<div class="page-num">{{PAGE_NUM}} / {{TOTAL}}</div>
</body>
</html>
