<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Bold Signal — Content</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { width: 1920px; height: 1080px; overflow: hidden; }

  body {
    width: 1920px; height: 1080px;
    background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
    font-family: 'Space Grotesk', sans-serif;
    color: #ffffff;
    padding: 80px 120px;
    position: relative;
    display: flex; flex-direction: column;
  }
  .section-label {
    font-size: 13px; font-weight: 500; letter-spacing: 0.15em;
    color: #FF5722; text-transform: uppercase; margin-bottom: 20px;
  }
  .title {
    font-family: 'Archivo Black', sans-serif;
    font-size: 64px; font-weight: 900; line-height: 1.05;
    color: #ffffff; margin-bottom: 48px; max-width: 800px;
  }
  .panel {
    background: rgba(35,35,35,0.80);
    border: 1px solid rgba(255,87,34,0.25);
    border-top: 1px solid rgba(255,150,100,0.15);
    border-bottom: 1px solid rgba(0,0,0,0.35);
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45), 0 4px 12px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,150,100,0.12);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 48px 56px;
    max-width: 760px;
  }
  .panel-title {
    font-size: 22px; font-weight: 700; color: #FF5722;
    margin-bottom: 16px;
  }
  .panel-body {
    font-size: 18px; line-height: 1.7; color: rgba(255,255,255,0.75);
  }
  .page-num {
    position: absolute; bottom: 56px; right: 120px;
    font-size: 13px; color: rgba(255,255,255,0.3);
  }
  {{PANEL_CSS}}
</style>
</head>
<body>
  <div class="section-label">{{EYEBROW}}</div>
  <h1 class="title">Panel 精修版<br>Bold Signal 面板</h1>
  <div class="panel">
    <div class="panel-title">精修参数</div>
    <div class="panel-body">{{PANEL_BODY}}</div>
  </div>
  <div class="page-num">{{PAGE_NUM}} / {{TOTAL}}</div>
</body>
</html>
